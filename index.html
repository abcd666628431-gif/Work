        async function migrateOldMassivePhotos() {
            let hasMigrated = false;
            for (const taskId of Object.keys(taskExtrasState)) {
                let extra = taskExtrasState[taskId];
                
                if (extra.currentPhotos && extra.currentPhotos.length > 0) {
                    for (let i = 0; i < extra.currentPhotos.length; i++) {
                        const compressedUrl = await compressBase64ImageSafeAsync(extra.currentPhotos[i]);
                        const photoId = `mig_${Date.now()}_${Math.random().toString(36).substr(2,5)}`;
                        const newItem = { id: photoId, url: compressedUrl, title: '舊任務紀錄', category: '任務附件', taskId, timestamp: new Date().toLocaleString('zh-TW') };
                        galleryItems.unshift(newItem);
                        if(currentUser) setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'gallery_items', photoId), newItem).catch(()=>{});
                    }
                    extra.currentPhotos = []; 
                    hasMigrated = true;
                }
                
                if (extra.subTasks) {
                    for (const subIdx of Object.keys(extra.subTasks)) {
                        if (extra.subTasks[subIdx].photos && extra.subTasks[subIdx].photos.length > 0) {
                            for (let i = 0; i < extra.subTasks[subIdx].photos.length; i++) {
                                const compressedUrl = await compressBase64ImageSafeAsync(extra.subTasks[subIdx].photos[i]);
                                const photoId = `migs_${Date.now()}_${Math.random().toString(36).substr(2,5)}`;
                                const newItem = { id: photoId, url: compressedUrl, title: '舊子任務紀錄', category: '任務附件', taskId, subIdx: parseInt(subIdx), timestamp: new Date().toLocaleString('zh-TW') };
                                galleryItems.unshift(newItem);
                                if(currentUser) setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'gallery_items', photoId), newItem).catch(()=>{});
                            }
                            extra.subTasks[subIdx].photos = []; 
                            hasMigrated = true;
                        }
                    }
                }
            }
            
            if (hasMigrated) {
                safeSetLocal('work_cache_daily_extras', taskExtrasState);
                safeSetLocal('work_cache_gallery_items', galleryItems);
                if(currentUser) {
                    setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'task_extras'), { extras: taskExtrasState });
                }
                renderDailySchedule();
            }
        }

                    if(document.getElementById('dailySchedulePage') && !document.getElementById('dailySchedulePage').classList.contains('hidden')) renderDailySchedule();
                }
            });

            setTimeout(migrateOldMassivePhotos, 2000);

        function compressImageSafeAsync(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 800; 
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                        } else {
                            if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = '#ffffff'; 
                        ctx.fillRect(0, 0, width, height);
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'medium';
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                    };
                    img.onerror = () => reject(new Error("圖片解析失敗"));
                };
                reader.onerror = () => reject(new Error("檔案讀取失敗"));
            });
        }

        function compressBase64ImageSafeAsync(base64Str) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                    } else {
                        if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, width, height);
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'medium';
                    ctx.drawImage(img, 0, 0, width, height);

                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
                img.onerror = () => resolve(base64Str); 
                img.src = base64Str;
            });
        }

        window.toggleTask = async (taskId) => {

            renderDailySchedule();
        };

        window.toggleTaskDetails = (taskId, event) => {

        window.deleteTaskCard = (taskId, event) => {

            delete subTaskCompletionState[taskId];
            delete taskExtrasState[taskId];

                setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'schedule'), { tasks: dailyScheduleData });
                setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'task_states'), { states: taskCompletionState });
                setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'subtask_states'), { states: subTaskCompletionState });

        window.exportData = async () => {
            window.showToast("準備導出資料...");

                const exportPayload = {
                    version: "5.0", exportDate: new Date().toISOString(),
                    dailyScheduleData, taskCompletionState, taskExtrasState, subTaskCompletionState,
                    galleryCategories, galleryItems
                };
                const blob = new Blob([JSON.stringify(exportPayload, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `工作記錄本_備份_${new Date().toISOString().slice(0,10)}.json`;
                a.click();
                window.showToast("導出成功！已儲存至下載資料夾");
            } catch (error) { window.showToast("導出失敗", true); }
        };

        window.importData = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    window.showToast("正在讀取並智能壓縮轉檔...(若照片多請稍候)");
                    const importedData = JSON.parse(e.target.result);
                    
                    let impSchedule = importedData.dailyScheduleData || dailyScheduleData;
                    let impTaskStates = importedData.taskCompletionState || taskCompletionState;
                    let impExtras = importedData.taskExtrasState || taskExtrasState;
                    let impSubStates = importedData.subTaskCompletionState || subTaskCompletionState;
                    let impGalCats = importedData.galleryCategories || galleryCategories;
                    let impGalItems = importedData.galleryItems || galleryItems;

                    if(!impGalCats.includes('任務附件')) impGalCats.push('任務附件');

                    let hasMigrated = false;
                    for (const taskId of Object.keys(impExtras)) {
                        let extra = impExtras[taskId];
                        if (extra.currentPhotos && extra.currentPhotos.length > 0) {
                            for (let i = 0; i < extra.currentPhotos.length; i++) {
                                const compressedUrl = await compressBase64ImageSafeAsync(extra.currentPhotos[i]);
                                const photoId = `mig_imp_${Date.now()}_${Math.random().toString(36).substr(2,5)}`;
                                impGalItems.unshift({ id: photoId, url: compressedUrl, title: '舊版任務紀錄 (已轉檔)', category: '任務附件', taskId, timestamp: new Date().toLocaleString('zh-TW') });
                            }
                            extra.currentPhotos = []; 
                            hasMigrated = true;
                        }
                        if (extra.subTasks) {
                            for (const subIdx of Object.keys(extra.subTasks)) {
                                if (extra.subTasks[subIdx].photos && extra.subTasks[subIdx].photos.length > 0) {
                                    for (let i = 0; i < extra.subTasks[subIdx].photos.length; i++) {
                                        const compressedUrl = await compressBase64ImageSafeAsync(extra.subTasks[subIdx].photos[i]);
                                        const photoId = `migs_imp_${Date.now()}_${Math.random().toString(36).substr(2,5)}`;
                                        impGalItems.unshift({ id: photoId, url: compressedUrl, title: '舊版子任務紀錄 (已轉檔)', category: '任務附件', taskId, subIdx: parseInt(subIdx), timestamp: new Date().toLocaleString('zh-TW') });
                                    }
                                    extra.subTasks[subIdx].photos = []; 
                                    hasMigrated = true;
                                }
                            }
                        }
                    }

                    dailyScheduleData = impSchedule;
                    taskCompletionState = impTaskStates;
                    taskExtrasState = impExtras;
                    subTaskCompletionState = impSubStates;
                    galleryCategories = impGalCats;
                    galleryItems = impGalItems;

                    safeSetLocal('work_cache_schedule', dailyScheduleData);
                    safeSetLocal('work_cache_task_states', taskCompletionState);
                    safeSetLocal('work_cache_daily_extras', taskExtrasState);
                    safeSetLocal('work_cache_subtask_states', subTaskCompletionState);
                    safeSetLocal('work_cache_gallery_categories', galleryCategories);
                    safeSetLocal('work_cache_gallery_items', galleryItems);

                    if (currentUser) {
                        window.showToast("資料轉檔完畢，正在同步至雲端...");
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'schedule'), { tasks: dailyScheduleData });
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'task_states'), { states: taskCompletionState });
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'subtask_states'), { states: subTaskCompletionState });
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'task_extras'), { extras: taskExtrasState });
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'gallery_categories'), { categories: galleryCategories });
                        
                        const batchLimit = 200;
                        for (let i = 0; i < galleryItems.length; i += batchLimit) {
                            const batch = writeBatch(db);
                            const chunk = galleryItems.slice(i, i + batchLimit);
                            chunk.forEach(item => {
                                batch.set(doc(db, 'artifacts', appId, 'public', 'data', 'gallery_items', item.id), item);
                            });
                            await batch.commit();
                        }
                    }

                    renderDailySchedule();
                    if(!document.getElementById('galleryPage').classList.contains('hidden')) window.renderGallery();
                    if(!document.getElementById('timelinePage').classList.contains('hidden')) window.renderTimeline(false);
                    
                    window.showToast("導入與轉檔全部成功！");
                    
                } catch (error) {
                    console.error(error);
                    window.showToast("導入失敗，可能是備份檔照片容量超過系統負荷", true);
                }
                event.target.value = ''; 
            };
            reader.readAsText(file);
        };

        window.renderGallery = () => {
            const sidebar = document.getElementById('gallerySidebar');
            const grid = document.getElementById('galleryGrid');
            if(!sidebar || !grid) return;

            sidebar.innerHTML = `
                <div class="w-full flex justify-center pt-2 pb-2 border-b border-slate-200 shrink-0 sticky top-0 bg-[#f4f1eb] z-20">
                    <button type="button" onclick="window.openCategoryManager()" class="p-1.5 bg-white text-slate-500 hover:text-slate-800 rounded shadow-sm border border-slate-200 active:scale-95 transition-all">
                        <i data-lucide="settings" class="w-4 h-4"></i>
                    </button>
                </div>
                <div class="flex flex-col space-y-2 w-full items-center pt-2 pb-6">
                    ${galleryCategories.map((cat) => {
                        return `
                        <div class="relative w-[60px] group shrink-0">
                            <div onclick="window.switchGalleryCategory('${cat}')" class="w-full py-2 text-[10px] tracking-widest rounded-md transition-colors ${currentGalleryCategory === cat ? 'bg-white text-blue-600 border border-slate-200 shadow-sm font-semibold' : 'text-slate-600 hover:bg-slate-200/50 border border-transparent'} px-1 cursor-pointer flex items-center justify-center break-words min-h-[30px] select-none text-center">
                                ${cat}
                            </div>
                        </div>
                        `;
                    }).join('')}
                    <button type="button" onclick="window.addCategory()" class="w-[60px] py-1.5 mt-1 mb-4 flex justify-center text-slate-400 hover:text-blue-500 hover:bg-slate-200/50 rounded border border-dashed border-slate-300 transition-colors shrink-0 active:scale-95"><i data-lucide="plus" class="w-4 h-4"></i></button>
                </div>
            `;

            const query = document.getElementById('gallerySearchInput').value.toLowerCase();
            let filtered = galleryItems.filter(item => {
                const matchCat = currentGalleryCategory === '全部' ? item.category !== '任務附件' : item.category === currentGalleryCategory;
                const matchQuery = (item.title||'').toLowerCase().includes(query) || (item.timestamp && item.timestamp.includes(query));
                return matchCat && matchQuery;
            });

            if(filtered.length === 0) {
                grid.innerHTML = '<div class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 text-xs tracking-widest"><i data-lucide="image-off" class="w-8 h-8 mb-2 opacity-50"></i>尚無對應圖片</div>';
            } else {
                grid.innerHTML = '<div class="grid grid-cols-2 gap-3 pb-6">' + filtered.map(item => `
                    <div class="bg-white rounded-md overflow-hidden border border-slate-200 shadow-sm flex flex-col group relative pb-1">
                        <div class="aspect-square w-full relative p-1 pb-0">
                            <img src="${item.url}" class="w-full h-full object-cover rounded-sm active:scale-95 transition-transform cursor-pointer" onclick="window.openFullscreenImg('${item.url}')"/>
                            <button onclick="window.removeTaskPhoto('${item.id}', event)" class="absolute top-2 right-2 p-1.5 bg-red-500/90 text-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity shadow-sm active:bg-red-600 z-10"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                        </div>
                        <div class="p-1.5 flex flex-col bg-white flex-1">
                            <div class="text-[11px] text-slate-700 font-medium break-words whitespace-pre-wrap w-full text-center focus:outline-none focus:bg-slate-50 rounded px-1 py-0.5 min-h-[24px] flex items-center justify-center leading-tight" contenteditable="true" onblur="window.updateGalleryTitle('${item.id}', this.innerText)">${item.title}</div>
                        </div>
                    </div>
                `).join('') + '</div>';
            }
            lucide.createIcons();
        };

        window.handleGalleryUpload = async (input) => {
            const files = input.files;
            if(!files || files.length===0 || !currentUser) return;
            window.showToast("處理與雲端上傳中...");
            for(let i=0; i<files.length; i++) {
               try {
                   const b64 = await compressImageSafeAsync(files[i]);
                   const newItem = {
                       id: 'g_m_'+Date.now()+'_'+Math.random().toString(36).substr(2,4),
                       url: b64,
                       title: currentGalleryCategory === '全部' ? '未命名相片' : currentGalleryCategory + '紀錄',
                       category: currentGalleryCategory === '全部' ? '未分類' : currentGalleryCategory,
                       timestamp: new Date().toLocaleString('zh-TW', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })
                   };
                   galleryItems.unshift(newItem);
                   await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'gallery_items', newItem.id), newItem);
               } catch(e) {}
            }
            safeSetLocal('work_cache_gallery_items', galleryItems);
            window.renderGallery();
            window.showToast("圖庫雲端上傳完成");
            input.value = '';
        };

        window.updateGalleryTitle = (id, text) => {
            const item = galleryItems.find(i => i.id === id);
            if(item && currentUser) {
                item.title = text.trim() || '未命名相片';
                setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'gallery_items', id), { title: item.title }, { merge: true });
            }
        };
        
        window.switchGalleryCategory = (cat) => { currentGalleryCategory = cat; window.renderGallery(); };
        window.openCategoryManager = () => { window.renderCategoryManager(); document.getElementById('categoryManageModal').classList.remove('hidden'); document.getElementById('categoryManageModal').classList.add('flex'); };
        window.closeCategoryManager = () => { document.getElementById('categoryManageModal').classList.add('hidden'); document.getElementById('categoryManageModal').classList.remove('flex'); };

        window.renderCategoryManager = () => {
            const list = document.getElementById('categoryManageList');
            if(!list) return;
            list.innerHTML = galleryCategories.map((cat) => {
                const isProtected = cat === '全部' || cat === '未分類' || cat === '任務附件';
                return `
                <div class="flex items-center justify-between bg-white p-2 rounded-xl border border-slate-200 shadow-sm">
                    ${isProtected ? `
                        <span class="text-sm font-bold text-slate-500 ml-1 tracking-widest">${cat} <span class="text-[10px] bg-slate-100 px-1.5 py-0.5 rounded ml-1 font-normal border border-slate-200">系統保留</span></span>
                        <div class="flex gap-1 opacity-30 pointer-events-none"><button class="p-1.5"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>
                    ` : `
                        <input type="text" value="${cat}" onblur="window.renameCategoryInModal('${cat}', this.value)" class="flex-1 bg-slate-50 border border-slate-200 rounded-lg px-2 py-1.5 text-sm text-slate-700 font-bold focus:outline-none focus:border-blue-400 focus:bg-white transition-colors mr-2 w-full min-w-0 tracking-widest shadow-inner">
                        <div class="flex gap-1 shrink-0"><button onclick="window.deleteCategoryInModal('${cat}')" class="p-1.5 text-red-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors active:scale-95"><i data-lucide="trash-2" class="w-4 h-4 pointer-events-none"></i></button></div>
                    `}
                </div>
                `;
            }).join('');
            lucide.createIcons();
        };

        window.addCategory = () => {
            const newName = prompt("請輸入新分類名稱：", "新分類");
            if(newName && newName.trim() !== '') {
                galleryCategories.push(newName.trim());
                if(currentUser) setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'gallery_categories'), { categories: galleryCategories });
                window.renderGallery();
            }
        };

        window.renameCategoryInModal = async (oldName, newName) => {
            newName = newName.trim();
            if(!newName || newName === oldName) { window.renderCategoryManager(); return; }
            if(galleryCategories.includes(newName)) { window.showToast("名稱已存在", true); window.renderCategoryManager(); return; }

            const idx = galleryCategories.indexOf(oldName);
            if(idx !== -1) {
                galleryCategories[idx] = newName;
                if(currentUser) {
                    setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'gallery_categories'), { categories: galleryCategories });
                    galleryItems.forEach(item => {
                        if(item.category === oldName) setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'gallery_items', item.id), { category: newName }, { merge: true });
                    });
                }
                if(currentGalleryCategory === oldName) currentGalleryCategory = newName;
                window.renderCategoryManager(); window.renderGallery();
            }
        };

        window.deleteCategoryInModal = async (catName) => {
            if (confirm(`確定要刪除「${catName}」？\n此分類下的圖片將移至「未分類」。`)) {
                if(currentUser) {
                    galleryItems.forEach(item => {
                        if(item.category === catName) setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'gallery_items', item.id), { category: '未分類' }, { merge: true });
                    });
                }
                const idx = galleryCategories.indexOf(catName);
                if(idx !== -1) galleryCategories.splice(idx, 1);
                if(currentUser) setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'gallery_categories'), { categories: galleryCategories });
                if(currentGalleryCategory === catName) currentGalleryCategory = '全部';
                window.renderCategoryManager(); window.renderGallery();
            }
        };

        window.completeTimelineTask = (taskId) => {
            // 直接完成或取消任務，不再讓卡片消失
            window.toggleTask(taskId); 
            if(!document.getElementById('timelinePage').classList.contains('hidden')) {
                window.renderTimeline(false); 
            }
        };

        window.renderTimeline = (scrollToCenter = false) => {
            const container = document.getElementById('timelineContainer');
            if(!container) return;

            // 1. 取得所有任務 (不再剔除已完成)，並依據時間排序
            let timelineTasks = [...dailyScheduleData];
            timelineTasks.sort((a, b) => parseTime(a.start) - parseTime(b.start));

            if (timelineTasks.length === 0) {
                container.innerHTML = '<div class="flex flex-col items-center justify-center h-full py-32 text-slate-400"><i data-lucide="party-popper" class="w-16 h-16 mb-4 text-green-500 opacity-80"></i><span class="text-base font-black tracking-widest text-slate-600">目前沒有任何任務</span></div>';
                lucide.createIcons();
                return;
            }

            // 取得現在時間，避免每次更新閃爍
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit' });
            const dateStr = now.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'long' });

            // 新增大時鐘 (Sticky 置頂懸浮)
            let html = `
                <div class="sticky top-0 z-50 w-full bg-gradient-to-b from-[#fdfbf7] via-[#fdfbf7]/95 to-transparent pt-3 pb-8 px-4 flex flex-col items-center justify-center pointer-events-none">
                    <div id="tlBigClock" class="font-mono text-[2.5rem] sm:text-5xl font-black text-slate-800 tracking-tighter bg-white/90 backdrop-blur-md px-6 py-1.5 sm:py-2 rounded-3xl border-[3px] border-slate-200 shadow-sm pointer-events-auto transition-all">${timeStr}</div>
                    <div id="tlBigDate" class="text-[11px] font-bold text-slate-500 mt-2 tracking-widest pointer-events-auto">${dateStr}</div>
                </div>
            `;

            // 調整左側空位：將 ml-[76px] 縮減為 ml-[56px] 讓卡片變寬，並對齊時間軸線
            html += '<div class="relative pt-[2vh] pb-[40vh] w-full max-w-md mx-auto flex flex-col px-2">';
            html += '<div class="absolute left-[32px] top-0 bottom-0 w-[3px] bg-[#d6d0c4] z-0 rounded-full"></div>';

            let hasCurrent = false;
            let targetScrollId = null;

            timelineTasks.forEach((task, index) => {
                const isCompleted = taskCompletionState[task.id];
                const status = calculateTaskStatus(task.start, task.end);
                let cardClass = '';
                let dotClass = '';
                let timeText = '';
                let checkBtnHtml = '';
                
                if (isCompleted) {
                    // 已完成：半透明，變灰色
                    cardClass = 'opacity-60 scale-[0.96] border-slate-200 bg-slate-100';
                    dotClass = 'bg-slate-300 w-4 h-4 left-[17.5px] border-[3px] border-[#fdfbf7]';
                    timeText = '<span class="text-slate-500 font-bold">✔ 已完成</span>';
                    checkBtnHtml = `<button onclick="window.completeTimelineTask('${task.id}')" class="w-10 h-10 rounded-full bg-green-500 border-2 border-green-500 text-white transition-all duration-300 flex items-center justify-center shadow-sm active:scale-90 z-10 relative cursor-pointer">
                                        <i data-lucide="check" class="w-5 h-5 pointer-events-none"></i>
                                    </button>`;
                } else if (status.state === 'overdue') {
                    // 已逾時：堆積在上方，半透明縮小
                    cardClass = 'opacity-80 scale-[0.96] border-[#d6d0c4] bg-[#fdfbf7] hover:opacity-100 transition-opacity';
                    dotClass = 'bg-red-400 w-4 h-4 left-[17.5px] border-[3px] border-[#fdfbf7]';
                    timeText = '<span class="text-red-500 font-bold">🔴 已逾時 (' + status.text.replace('已結束 (超時 ', '').replace(')', '') + ')</span>';
                    if (!hasCurrent && !targetScrollId) targetScrollId = `tl-task-wrapper-${task.id}`;
                    checkBtnHtml = `<button onclick="window.completeTimelineTask('${task.id}')" class="w-10 h-10 rounded-full bg-white border-2 border-[#d6d0c4] text-slate-400 hover:bg-green-500 hover:text-white hover:border-green-500 transition-all duration-300 flex items-center justify-center shadow-sm active:scale-90 group cursor-pointer z-10 relative">
                                        <i data-lucide="check" class="w-5 h-5 pointer-events-none group-hover:scale-110 transition-transform"></i>
                                    </button>`;
                } else if (status.state === 'active') {
                    // 當前任務：強烈高亮放大
                    cardClass = 'border-blue-500 shadow-xl scale-105 bg-blue-50 z-20';
                    dotClass = 'bg-blue-500 w-6 h-6 left-[13.5px] border-[4px] border-[#fdfbf7] shadow-md animate-[pulse_2s_ease-in-out_infinite]';
                    timeText = '<span class="text-blue-600 font-bold">🟢 當前任務</span>';
                    hasCurrent = true;
                    targetScrollId = `tl-task-wrapper-${task.id}`;
                    checkBtnHtml = `<button onclick="window.completeTimelineTask('${task.id}')" class="w-10 h-10 rounded-full bg-white border-2 border-[#d6d0c4] text-slate-400 hover:bg-green-500 hover:text-white hover:border-green-500 transition-all duration-300 flex items-center justify-center shadow-sm active:scale-90 group cursor-pointer z-10 relative">
                                        <i data-lucide="check" class="w-5 h-5 pointer-events-none group-hover:scale-110 transition-transform"></i>
                                    </button>`;
                } else { 
                    // 未來即將到來：正常顯示

        function parseTime(timeStr) { const [h, m] = timeStr.split(':').map(Number); const d = new Date(); d.setHours(h, m, 0, 0); return d; }
        function calculateTaskStatus(startStr, endStr) {
            const now = new Date(), start = parseTime(startStr), end = parseTime(endStr);
            if (now < start) {
                const diffMins = Math.floor((start - now) / 60000);
                return { state: 'waiting', text: `未開始 (約 ${Math.floor(diffMins/60)>0?Math.floor(diffMins/60)+'小時':''}${diffMins%60}分後)` };
            } else if (now >= start && now <= end) {
                const diffMins = Math.floor((end - now) / 60000);
                return { state: 'active', text: `進行中 (剩餘 ${Math.floor(diffMins/60)>0?Math.floor(diffMins/60)+'小時':''}${diffMins%60}分)` };
            } else {
                const diffMins = Math.floor((now - end) / 60000);
                return { state: 'overdue', text: `已結束 (超時 ${Math.floor(diffMins/60)>0?Math.floor(diffMins/60)+'小時':''}${diffMins%60}分)` };

            });
            
            if (window.isEditMode) {
                container.insertAdjacentHTML('beforeend', `
                    <div class="mt-6 flex justify-center pb-4">
                        <button type="button" onclick="window.addNewTaskCard()" class="w-full bg-white rounded-2xl p-5 border-2 border-dashed border-blue-300 text-blue-500 hover:bg-blue-50 transition-all duration-300 flex flex-col items-center justify-center active:scale-[0.98] group shadow-sm cursor-pointer">
                            <i data-lucide="plus-circle" class="w-7 h-7 mb-2 group-hover:scale-110 transition-transform"></i><span class="text-xs tracking-widest font-bold">新增排程卡片</span>
                        </button>
                    </div>
                `);
            }

            lucide.createIcons();
            if(timeUpdateInterval) clearInterval(timeUpdateInterval);
            timeUpdateInterval = setInterval(() => {
                if(!document.getElementById('dailySchedulePage').classList.contains('hidden') && !window.isEditMode) {
                    dailyScheduleData.forEach(task => {
                        if (!taskCompletionState[task.id]) {
                            const status = calculateTaskStatus(task.start, task.end);
                            const statusEl = document.getElementById(`status-text-${task.id}`);
                            if (statusEl) {
                                statusEl.textContent = status.text;
                                if (status.state === 'active') statusEl.className = 'text-[11px] text-blue-600 font-bold ml-2 text-right tracking-wide';
                                else if (status.state === 'overdue') statusEl.className = 'text-[11px] text-red-500 font-bold ml-2 text-right tracking-wide';
                                else statusEl.className = 'text-[11px] text-slate-400 font-bold ml-2 text-right tracking-wide';
                            }
                        }
                    });
                }
            }, 60000); 

            setTimeout(() => {
                const cards = document.querySelectorAll('.daily-task-card');
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting && !window.isEditMode && !entry.target.innerHTML.includes('任務完成')) entry.target.classList.add('card-focused');
                        else entry.target.classList.remove('card-focused');
                    });
                }, { rootMargin: "-35% 0px -35% 0px" });
                cards.forEach(card => observer.observe(card));
            }, 100);
        }

        window.closeArchive = () => {
            document.getElementById('archiveModal').classList.add('hidden');
            document.getElementById('archiveModal').classList.remove('flex');
        };
        
        window.openFullscreenImg = (src) => {
            const viewer = document.getElementById('imageViewer');
            document.getElementById('imageViewerImg').src = src;
            viewer.classList.remove('hidden');
            viewer.classList.add('flex');
        };

        window.switchTab = (tab) => {
            const customPage = document.getElementById('customWorkflowPage'), dailyPage = document.getElementById('dailySchedulePage'), galleryPage = document.getElementById('galleryPage'), timelinePage = document.getElementById('timelinePage');
            const btnCustom = document.getElementById('tabCustom'), btnDaily = document.getElementById('tabDaily'), btnGallery = document.getElementById('tabGallery'), btnTimeline = document.getElementById('tabTimeline');
            const activeClass = "flex-1 py-1.5 text-[11px] sm:text-sm rounded-md bg-white text-blue-600 shadow-sm border border-[#d6d0c4] font-semibold transition-all uppercase tracking-widest";
            const inactiveClass = "flex-1 py-1.5 text-[11px] sm:text-sm text-slate-500 hover:text-slate-700 transition-all uppercase tracking-widest";

            if(customPage) customPage.classList.add('hidden'); if(dailyPage) dailyPage.classList.add('hidden'); if(galleryPage) galleryPage.classList.add('hidden'); if(timelinePage) timelinePage.classList.add('hidden');
            if(btnCustom) btnCustom.className = inactiveClass; if(btnDaily) btnDaily.className = inactiveClass; if(btnGallery) btnGallery.className = inactiveClass; if(btnTimeline) btnTimeline.className = inactiveClass;

            if (tab === 'custom' && customPage) { customPage.classList.remove('hidden'); btnCustom.className = activeClass; } 
            else if (tab === 'daily' && dailyPage) { dailyPage.classList.remove('hidden'); btnDaily.className = activeClass; renderDailySchedule(); } 
            else if (tab === 'gallery' && galleryPage) { galleryPage.classList.remove('hidden'); btnGallery.className = activeClass; window.renderGallery(); }
            else if (tab === 'timeline' && timelinePage) { timelinePage.classList.remove('hidden'); btnTimeline.className = activeClass; window.renderTimeline(true); }
            localStorage.setItem('activeTab', tab);
        };

        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
            } catch (error) { window.showToast("連線驗證失敗", true); }
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                connectionDot.classList.replace('bg-red-500', 'bg-green-500');
                connectionStatus.textContent = '系統已連線並同步';
                setupPureRealtimeSync();
            } else {
                connectionDot.classList.replace('bg-green-500', 'bg-red-500');
                connectionStatus.textContent = '連線中或驗證失敗...';
            }
        });

        loadLocalFastCache();
        initAuth();
        window.switchTab(localStorage.getItem('activeTab') || 'daily');
    </script>
</head>
<body class="sm:px-4 sm:py-8 flex justify-center relative min-h-screen">

    <!-- Phone Container -->
    <div class="w-full max-w-[430px] bg-[#fdfbf7] sm:rounded-[2.5rem] sm:shadow-2xl sm:border-[6px] border-[#d6d0c4] overflow-hidden relative min-h-screen sm:min-h-[932px] pb-10">
        
        <!-- Header -->
        <header class="bg-[#fdfbf7]/95 backdrop-blur-md sticky top-0 z-10 border-b border-[#e5dfd3] p-5 pt-8 sm:pt-12 shadow-sm">
            <div class="flex items-center justify-between relative">
                <div class="w-8"></div>
                <h1 class="text-xl text-slate-800 tracking-widest font-black">工作記錄本</h1>
                
                <div class="flex items-center gap-2">
                    <input type="file" id="importInput" accept=".json" class="hidden" onchange="window.importData(event)">
                    <button type="button" onclick="document.getElementById('importInput').click()" class="w-8 h-8 rounded-full bg-slate-100 border border-slate-200 text-slate-500 hover:text-blue-600 hover:border-blue-300 flex items-center justify-center transition-colors active:scale-95 shadow-sm" title="導入舊資料 (自動轉檔)">
                        <i data-lucide="upload" class="w-4 h-4 pointer-events-none"></i>
                    </button>
                    <button type="button" onclick="window.exportData()" class="w-8 h-8 rounded-full bg-slate-100 border border-slate-200 text-slate-500 hover:text-blue-600 hover:border-blue-300 flex items-center justify-center transition-colors active:scale-95 shadow-sm" title="導出備份資料">
                        <i data-lucide="download" class="w-4 h-4 pointer-events-none"></i>
                    </button>
                </div>
            </div>
            <p class="text-[10px] text-center mt-2 flex items-center justify-center space-x-2 tracking-wide text-slate-500">
                <span id="connectionDot" class="w-2 h-2 rounded-full bg-red-500 transition-colors duration-300"></span>
                <span id="connectionStatus">System Connecting...</span>
            </p>

            <!-- 分頁切換 (Tab Control) -->
            <div class="mt-4 flex bg-[#f0ebe1] rounded-lg p-1 shadow-inner border border-[#e5dfd3] relative z-20">
                <button id="tabCustom" onclick="window.switchTab('custom')" class="flex-1 py-1.5 text-[11px] sm:text-sm text-slate-500 hover:text-slate-700 transition-all uppercase tracking-widest">自訂流程</button>
                <button id="tabDaily" onclick="window.switchTab('daily')" class="flex-1 py-1.5 text-[11px] sm:text-sm rounded-md bg-white text-blue-600 shadow-sm border border-[#d6d0c4] font-semibold transition-all uppercase tracking-widest">每日排程</button>
                <button id="tabTimeline" onclick="window.switchTab('timeline')" class="flex-1 py-1.5 text-[11px] sm:text-sm text-slate-500 hover:text-slate-700 transition-all uppercase tracking-widest">動態任務</button>
                <button id="tabGallery" onclick="window.switchTab('gallery')" class="flex-1 py-1.5 text-[11px] sm:text-sm text-slate-500 hover:text-slate-700 transition-all uppercase tracking-widest">更多圖片</button>
            </div>
        </header>

        <!-- Main Content (自訂流程) -->
        <main id="customWorkflowPage" class="p-5 space-y-2 block transition-opacity">
            <div id="stepsContainer"></div>
            <button 
                id="addBoxBtn"
                type="button"
                onclick="window.addStep()"
                disabled
                class="w-full border-2 border-dashed border-slate-300 rounded-2xl p-6 flex flex-col items-center justify-center text-slate-400 hover:text-blue-500 hover:border-blue-300 hover:bg-slate-50 transition-all active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed relative z-10 cursor-pointer bg-white shadow-sm"
            >
                <i data-lucide="plus-circle" class="w-8 h-8 mb-2 pointer-events-none"></i>
                <span class="text-sm font-medium pointer-events-none">新增步驟</span>
            </button>
        </main>
        
        <!-- Main Content (每日排程 - 預設隱藏) -->
        <main id="dailySchedulePage" class="p-5 space-y-2 hidden transition-opacity relative z-10 h-[calc(100vh-140px)] sm:h-[750px] overflow-y-auto scrollbar-hide">
            
            <div class="flex justify-end mb-2 px-1">
                <label class="flex items-center cursor-pointer space-x-2 bg-white px-3 py-1.5 rounded-full border border-slate-200 shadow-sm active:scale-95 transition-transform">
                    <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest transition-colors duration-300" id="editModeLabel">一般檢視模式</span>
                    <div class="relative flex items-center">
                        <input type="checkbox" id="editModeToggle" class="sr-only" onchange="window.toggleEditMode(this.checked)">
                        <div class="block bg-slate-300 w-9 h-5 rounded-full border border-slate-300 transition-colors duration-300 shadow-inner" id="editToggleBg"></div>
                        <div class="dot absolute left-1 bg-white w-3 h-3 rounded-full transition-transform duration-300 shadow-sm" id="editToggleDot"></div>
                    </div>
                </label>
            </div>

            <div id="hudContainer" class="flex flex-col items-center justify-center mb-6 p-5 bg-white rounded-2xl border border-slate-200 shadow-sm relative overflow-hidden">
                <div class="relative w-32 h-32 mb-2 z-10">
                    <svg class="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="40" fill="none" stroke="currentColor" class="text-slate-100" stroke-width="8"></circle>
                        <circle id="hudProgressRing" cx="50" cy="50" r="40" fill="none" stroke="currentColor" class="text-blue-500 hud-ring drop-shadow-sm" stroke-width="8" stroke-dasharray="251.2" stroke-dashoffset="251.2" stroke-linecap="round"></circle>
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                        <span id="hudPercentage" class="text-2xl text-slate-800 font-black tracking-wider mt-1">0%</span>
                        <span class="text-[9px] text-slate-500 tracking-widest font-bold mt-0.5">達成率</span>
                    </div>
                </div>
                <div class="text-[11px] text-slate-600 tracking-wide flex items-center justify-center space-x-2 bg-slate-50 px-4 py-1.5 rounded-full border border-slate-200 z-10">
                    <i data-lucide="check-circle" class="w-4 h-4 text-blue-500"></i>
                    <span>已完成任務: <span id="hudTaskCount" class="text-blue-600 font-bold ml-1">0/14</span></span>
                </div>
            </div>

            <div id="scheduleContainer" class="space-y-4 pb-8"></div>
        </main>

        <!-- Main Content (動態時間軸任務流 - 新增功能) -->
        <!-- 注意：這個容器被限制高度並設置 overflow-y-auto，確保只有卡片列表滾動，外框不跳動 -->
        <main id="timelinePage" class="hidden h-[calc(100vh-140px)] sm:h-[750px] overflow-y-auto relative z-10 bg-[#fdfbf7] scrollbar-hide scroll-smooth">
            <div id="timelineContainer" class="min-h-full">
                <!-- 動態內容生成區 -->
            </div>
            
            <!-- 浮動按鈕：手動對焦回到當前進行中的任務 -->
            <button type="button" onclick="window.renderTimeline(true)" class="fixed bottom-10 right-6 sm:absolute sm:bottom-6 sm:right-6 bg-slate-800 text-white rounded-full p-3 shadow-[0_8px_20px_-6px_rgba(0,0,0,0.4)] hover:bg-slate-700 active:scale-95 transition-transform z-30 flex items-center justify-center">
                <i data-lucide="crosshair" class="w-5 h-5 pointer-events-none"></i>
            </button>
        </main>

        <!-- Main Content (獨立圖庫存檔) -->
        <main id="galleryPage" class="hidden h-[calc(100vh-140px)] sm:h-[750px] flex-col relative z-10 bg-[#fdfbf7]">
            <div class="p-3 border-b border-[#e6e2d6] flex space-x-2 bg-white shrink-0 shadow-sm z-20 relative">
                <div class="relative flex-1">
                    <i data-lucide="search" class="absolute left-2.5 top-2.5 w-4 h-4 text-slate-400"></i>
                    <input type="text" id="gallerySearchInput" placeholder="搜尋圖片標題或日期..." oninput="window.renderGallery()" class="w-full bg-slate-50 border border-slate-200 rounded-lg pl-8 pr-3 py-2 text-xs text-slate-700 placeholder-slate-400 focus:border-blue-400 focus:bg-white focus:outline-none tracking-wide">
                </div>
                <label class="bg-blue-50 text-blue-600 border border-blue-200 px-3 py-2 rounded-lg flex items-center justify-center cursor-pointer active:bg-blue-100 text-[11px] font-bold tracking-wide transition-colors shadow-sm">
                    <i data-lucide="upload" class="w-4 h-4 mr-1"></i> 上傳
                    <input type="file" accept="image/*" multiple class="hidden" onchange="window.handleGalleryUpload(this)">
                </label>
            </div>
            
            <div class="flex flex-1 overflow-hidden relative z-10">
                <div class="w-[75px] shrink-0 border-r border-[#e6e2d6] bg-[#f4f1eb] overflow-y-auto flex flex-col items-center space-y-2 scrollbar-hide" id="gallerySidebar">
                </div>
                <div class="flex-1 p-3 overflow-y-auto bg-[#fdfbf7] relative scrollbar-hide" id="galleryGrid">
                </div>
            </div>
        </main>

    </div>

    <!-- 更多圖片 Modal -->
    <div id="archiveModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center p-4">
        <div class="bg-white border border-slate-200 shadow-2xl rounded-2xl w-full max-w-[400px] max-h-[80vh] flex flex-col overflow-hidden relative">
            <header class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h2 class="text-slate-800 font-bold tracking-widest text-base flex items-center"><i data-lucide="images" class="w-5 h-5 mr-2 text-blue-500"></i> 歷史圖庫</h2>
                <button onclick="window.closeArchive()" class="text-slate-400 p-1.5 rounded-full hover:bg-slate-200 active:scale-95 transition-all"><i data-lucide="x" class="w-6 h-6"></i></button>
            </header>
            <div id="archiveContent" class="flex-1 overflow-y-auto p-4 pb-6 scrollbar-hide bg-[#fdfbf7]">
            </div>
        </div>
    </div>

    <!-- 圖片放大預覽 Modal -->
    <div id="imageViewer" class="fixed inset-0 bg-black/95 z-[200] hidden flex-col items-center justify-center p-4">
        <button onclick="document.getElementById('imageViewer').classList.add('hidden'); document.getElementById('imageViewer').classList.remove('flex');" class="absolute top-6 right-6 text-white bg-slate-800/80 p-2 rounded-full active:scale-95 shadow-lg border border-slate-600">
            <i data-lucide="x" class="w-6 h-6"></i>
        </button>
        <img id="imageViewerImg" src="" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl border border-slate-700" />
    </div>

    <!-- 管理分類 Modal -->
    <div id="categoryManageModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[250] hidden flex-col items-center justify-center p-4">
        <div class="bg-white border border-slate-200 shadow-2xl rounded-2xl w-full max-w-[320px] flex flex-col overflow-hidden relative">
            <header class="p-3.5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h2 class="text-slate-800 font-bold tracking-widest text-sm flex items-center"><i data-lucide="settings-2" class="w-4 h-4 mr-2 text-blue-500"></i> 管理圖庫分類</h2>
                <button onclick="window.closeCategoryManager()" class="text-slate-400 p-1.5 rounded-full hover:bg-slate-200 active:scale-95 transition-all"><i data-lucide="x" class="w-5 h-5"></i></button>
            </header>
            <div id="categoryManageList" class="p-3 overflow-y-auto max-h-[55vh] bg-[#fdfbf7] space-y-2 scrollbar-hide">
            </div>
        </div>
    </div>

</body>
</html>
