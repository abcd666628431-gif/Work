    <!-- Tailwind CSS -->

    <!-- Lucide Icons -->

    <!-- Google Fonts for Notebook style -->

    <style>
        /* 筆記本風格樣式設定 */
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #f0ebe1; color: #334155; }
        .hud-ring { transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1); }
        /* 隱藏水平捲軸 */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 新增：手繪與筆記本彩色元素 */
        .marker-yellow { background: linear-gradient(104deg, transparent 0%, rgba(254, 240, 138, 0.8) 2%, rgba(253, 224, 71, 0.9) 98%, transparent 100%); background-size: 100% 38%; background-position: 0 85%; background-repeat: no-repeat; padding: 0 2px; }
        .marker-pink { background: linear-gradient(104deg, transparent 0%, rgba(254, 205, 211, 0.8) 2%, rgba(253, 164, 175, 0.9) 98%, transparent 100%); background-size: 100% 38%; background-position: 0 85%; background-repeat: no-repeat; padding: 0 2px; }
        .marker-blue { background: linear-gradient(104deg, transparent 0%, rgba(186, 230, 253, 0.8) 2%, rgba(125, 211, 252, 0.9) 98%, transparent 100%); background-size: 100% 38%; background-position: 0 85%; background-repeat: no-repeat; padding: 0 2px; }
        .marker-green { background: linear-gradient(104deg, transparent 0%, rgba(187, 247, 208, 0.8) 2%, rgba(134, 239, 172, 0.9) 98%, transparent 100%); background-size: 100% 38%; background-position: 0 85%; background-repeat: no-repeat; padding: 0 2px; }

        .sticky-note-1 { background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); border-left: 3px solid #fbbf24; box-shadow: 2px 2px 5px rgba(0,0,0,0.04); }
        .sticky-note-2 { background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); border-left: 3px solid #4ade80; box-shadow: 2px 2px 5px rgba(0,0,0,0.04); }
        .sticky-note-3 { background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%); border-left: 3px solid #60a5fa; box-shadow: 2px 2px 5px rgba(0,0,0,0.04); }

        .tape-strip { position: absolute; top: -6px; left: 50%; transform: translateX(-50%); width: 35px; height: 12px; border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 1px 2px rgba(0,0,0,0.05); backdrop-filter: blur(2px); z-index: 5; border-radius: 1px; }
        .tape-strip-1 { background-color: rgba(255, 255, 255, 0.6); }
        .tape-strip-2 { background-color: rgba(254, 240, 138, 0.5); }
        .tape-strip-3 { background-color: rgba(186, 230, 253, 0.5); }

        /* 卡片滾動對焦特效 */
        .daily-task-card { transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), border-color 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .card-focused {
            border-color: #60a5fa !important;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.25), 0 8px 10px -6px rgba(59, 130, 246, 0.1) !important;
            transform: scale(1.02) !important;
            z-index: 30;
        }
    </style>

    <script type="module">

        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://gs.jurieo.com/gemini/gstatic/firebasejs/11.6.1/firebase-auth.js";
        // 核心升級：導入純粹的 getFirestore，回歸極速即時同步
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://gs.jurieo.com/gemini/gstatic/firebasejs/11.6.1/firebase-firestore.js";

        const userFirebaseConfig = {
            apiKey: "AIzaSyBsdBYBeJYqgeDDxF39lZ0pr785SMnwvJs",
            authDomain: "work-eb62f.firebaseapp.com",
            databaseURL: "https://work-eb62f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "work-eb62f",
            storageBucket: "work-eb62f.firebasestorage.app",
            messagingSenderId: "428210130706",
            appId: "1:428210130706:web:142207595423bdf661adcb"
        };

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : userFirebaseConfig;
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        // 完全使用跟影片庫相同的直連模式，捨棄繁重的本地快取設定
        let db = getFirestore(app);
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let steps = [];
        let currentUser = null;
        let unsubscribeSnapshot = null;
        let unsubscribeImagesSnapshot = null;

        const connectionStatus = document.getElementById('connectionStatus');
        const connectionDot = document.getElementById('connectionDot');
        const stepsContainer = document.getElementById('stepsContainer');
        const addBoxBtn = document.getElementById('addBoxBtn');

        const defaultDailyScheduleData = [
            {

                subSteps: [

                ]
            },
            { 
                id: 't2', start: '07:25', end: '07:30', title: '錄入豬肉價格', content: '完成價格收集及錄入市政署系統內', note: '8:00後致電通知樓上稽查',
                subSteps: [
                    "登入市政署系統",
                    "核對並錄入收集到的豬肉價格",
                    "確認錄入無誤後存檔"
                ]
            },
            { 
                id: 't3', start: '07:30', end: '08:30', title: '早更資料與相片發送', content: '1. Whatapps: 返豬相*6, 豬溫相*6<br>2. Wechat: 上班照*5 (客服7人,清潔8人,保安2人,清潔1人,清潔1人)<br>3. 更新豬肉3個表格(總表/營運/十項)', note: '相片留底: 桌面>01及02<br>表格: 公機SHARE內',
                subSteps: [
                    "Whatapps: 發送返豬相*6 (車上*1/板車*2/冇豬*1/攤檔*2)",

                    "Wechat: 發送上班照*5 (客服/清潔/保安)",

                    "更新表格 (1) 街市豬肉十項變動總表",
                    "更新表格 (2) 街市豬肉檔屠豬及營運資料總表",

                ]
            },
            { id: 't4', start: '08:30', end: '09:25', title: '收集魚/菜/雞/牛肉資料', content: '1. 收魚價、菜價、菜單/菜標、進貨公斤重量<br>2. 收生鮮及冰鮮雞單,影相發送,填雞表<br>3. 收牛價<br>完成價格收集及錄入市政署系統內', note: '生鮮雞相*4(每檔1張不同類)。<br>致電通知樓上稽查。<br>相片留底至桌面>01' },
            { id: 't5', start: '09:30', end: '10:30', title: '巡檔、抄溫與文員工作', content: '1. 剔檔(承租人狀況表)、抄溫度<br>2. 收豬肉紙及拆貨單,寫菜簿、雞簿<br>3. 更新表格(生鮮雞/豬肉檔/蔬菜重量)<br>4. 影豬肉營業相*14發送Whatapps/Wechat<br>5. 埋欄開燈相*2發送Wechat', note: '抄溫時段: 9-11, 11-13, 16-18, 18-20<br>(10:00-10:30) 開燈, (18:00-18:30) 關燈<br>無論有沒有營業都需要拍相' },
            { id: 't6', start: '10:00', end: '13:00', title: '還單與掃描', content: '還單，後掃描豬肉聲明書、菜單、牛肉單、雞單、拆貨單，並按相關格式命名檔案儲至 Share 派單', note: '公機SHARE內' },
            { id: 't7', start: '10:00', end: '19:00', title: '提早收工時段', content: '開始提早收工', note: '' },
            { id: 't8', start: '10:30', end: '11:30', title: '稽查簽署', content: '稽查到客服室簽署菜簿、雞簿、單據等。', note: '' },
            { id: 't9', start: '11:30', end: '12:00', title: '午間剔檔與抄溫', content: '剔檔(承租人親身經營狀況表)、抄溫度', note: '抄溫時段: 9-11, 11-13, 16-18, 18-20' },
            { id: 't10', start: '13:00', end: '14:00', title: '收雞單', content: '收J-022雞單,並掃描 派單', note: '' },
            { id: 't11', start: '16:00', end: '19:00', title: '雞檔收工', content: '雞檔收工時段', note: '' },
            { id: 't12', start: '16:30', end: '17:00', title: '傍晚剔檔與抄溫', content: '剔檔(承租人親身經營狀況表)、抄溫度', note: '抄溫時段: 9-11, 11-13, 16-18, 18-20' },
            { id: 't13', start: '17:30', end: '19:30', title: '豬肉檔收工', content: '豬肉檔收工,入表「街市豬肉檔屠豬及營運資料總表」', note: '公機SHARE內' },
            { id: 't14', start: '18:30', end: '19:00', title: '晚間剔檔與抄溫', content: '剔檔(承租人親身經營狀況表)、抄溫度', note: '抄溫時段: 9-11, 11-13, 16-18, 18-20' }
        ];

        let dailyScheduleData = defaultDailyScheduleData;
        let taskCompletionState = {};
        let taskExtrasState = {}; 
        let taskArchiveState = {}; 
        let subTaskCompletionState = {}; 
        let expandedTasksState = {}; 
        
        let galleryCategories = ['全部', '未分類', '街市檔口', '鮮風機', '價格表', '其他'];
        let galleryItems = [];
        let currentGalleryCategory = '全部';

        window.isEditMode = false;
        let timeUpdateInterval;

        // ==========================================
        // 🌟 雲端同步助手 (Helper Functions) 
        // ==========================================
        const saveScheduleToCloud = async () => { if(currentUser) return setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'schedule'), { tasks: dailyScheduleData }); };
        const saveTaskStatesToCloud = async () => { if(currentUser) return setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'task_states'), { states: taskCompletionState }); };
        const saveSubTaskStatesToCloud = async () => { if(currentUser) return setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'subtask_states'), { states: subTaskCompletionState }); };
        const saveExtrasToCloud = async (taskId) => { if(currentUser) return setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'daily_extras', taskId), taskExtrasState[taskId] || {}); };
        const saveCategoriesToCloud = async () => { if(currentUser) return setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'gallery_categories'), { categories: galleryCategories }); };

        // ==========================================
        // 🚀 核心升級：配置秒開雙層快取，並實作無痛舊資料大遷移
        // ==========================================

        // 幫手函數：安全讀取最舊的 localStorage 資料
        const getOldLocal = (key) => {
            try { const val = localStorage.getItem(key); return val ? JSON.parse(val) : null; } 
            catch(e) { return null; }
        };

        function loadLocalData() {
            try {
                // 優先讀取秒開快取 (這是前一次 onSnapshot 存下來的最新狀態)
                const sd = getOldLocal('work_cache_schedule'); if (sd) dailyScheduleData = sd;
                const ts = getOldLocal('work_cache_task_states'); if (ts) taskCompletionState = ts;
                const te = getOldLocal('work_cache_daily_extras'); if (te) taskExtrasState = te;
                const ta = getOldLocal('work_cache_daily_archive'); if (ta) taskArchiveState = ta;
                const st = getOldLocal('work_cache_subtask_states'); if (st) subTaskCompletionState = st;
                const gc = getOldLocal('work_cache_gallery_categories'); if (gc) galleryCategories = gc;
                const gi = getOldLocal('work_cache_gallery_items'); if (gi) galleryItems = gi;

                currentGalleryCategory = galleryCategories[0] || '全部';

                Object.keys(taskExtrasState).forEach(key => {
                    const extra = taskExtrasState[key];
                    if (extra.photo !== undefined && !extra.currentPhotos) {
                        extra.currentPhotos = extra.photo ? [extra.photo] : [];
                        delete extra.photo;
                    }
                    if (extra.note !== undefined && !extra.currentNotes) {
                        extra.currentNotes = extra.note ? [extra.note] : [];
                        delete extra.note;
                    }
                    if (!extra.subTasks) {
                        extra.subTasks = {};
                    }
                });
                
                // 讀取完畢，馬上渲染一次讓用戶有畫面看
                if(document.getElementById('dailySchedulePage') && !document.getElementById('dailySchedulePage').classList.contains('hidden')) {
                    renderDailySchedule();
                }
                if(document.getElementById('galleryPage') && !document.getElementById('galleryPage').classList.contains('hidden')) {
                    window.renderGallery();
                }
            } catch (error) {
                console.error("載入本地備援失敗:", error);
            }
        }
        
        // 🚀 強力自動轉移機制：把舊版最古老的「localStorage」舊資料一次性打上雲端
        async function migrateLocalToCloud() {
            if (!currentUser) return;
            const migrated = localStorage.getItem('cloud_migrated_v4');
            if (migrated) return;

            window.showToast("🚀 正在為您將舊數據上雲端...", false);
            try {
                // 抓取最古老的那些 key (v1, v2 時期的產物)
                const sd = getOldLocal('userDailyScheduleData');
                if (sd && sd.length > 0) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'schedule'), { tasks: sd });

                const ts = getOldLocal('dailyTasksState');
                if (ts) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'task_states'), { states: ts });

                const st = getOldLocal('subTaskCompletionState');
                if (st) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'subtask_states'), { states: st });

                const gc = getOldLocal('galleryCategories');
                if (gc) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'gallery_categories'), { categories: gc });

                const te = getOldLocal('dailyTasksExtras');
                if (te) {
                    for (const taskId in te) {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'daily_extras', taskId), te[taskId]);
                    }
                }

                const ta = getOldLocal('dailyTasksArchive');
                if (ta) {
                    for (const taskId in ta) {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'daily_archive', taskId), { archive: ta[taskId] });
                    }
                }

                const gi = getOldLocal('galleryItems');
                if (gi && gi.length > 0) {
                    for (const item of gi) {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'gallery_items', item.id), item);
                    }
                }

                // 標記為已遷移，避免重複執行
                localStorage.setItem('cloud_migrated_v4', 'true');
                window.showToast("✅ 舊數據雲端同步成功！已跨越儲存限制！");
            } catch (e) {
                console.error("Migration error:", e);
                window.showToast("資料轉移稍有延遲，將於背景繼續處理");
            }
        }

        window.toggleEditMode = (isChecked) => {
            window.isEditMode = isChecked;
            const bg = document.getElementById('editToggleBg');
            const dot = document.getElementById('editToggleDot');
            const label = document.getElementById('editModeLabel');
            
            if (isChecked) {
                bg.classList.replace('bg-slate-300', 'bg-blue-200');
                bg.classList.replace('border-slate-300', 'border-blue-300');
                dot.classList.add('translate-x-4');
                dot.classList.replace('bg-white', 'bg-blue-500');
                label.textContent = '文字編輯中';
                label.classList.replace('text-slate-500', 'text-blue-600');
            } else {
                bg.classList.replace('bg-blue-200', 'bg-slate-300');
                bg.classList.replace('border-blue-300', 'border-slate-300');
                dot.classList.remove('translate-x-4');
                dot.classList.replace('bg-blue-500', 'bg-white');
                label.textContent = '一般檢視模式';
                label.classList.replace('text-blue-600', 'text-slate-500');
            }
            renderDailySchedule();
        };

        window.updateTaskData = (taskId, field, value, subIdx = -1) => {
            const task = dailyScheduleData.find(t => t.id === taskId);
            if (task) {
                const cleanValue = typeof value === 'string' ? value.trim() : value;
                if (subIdx !== -1) {
                    task.subSteps[subIdx] = cleanValue;
                } else {
                    task[field] = cleanValue;
                }
                saveScheduleToCloud();
                window.showToast("資料已同步更新");
            }
        };

        window.addNewTaskCard = () => {
            const newId = 't_' + Date.now();
            const newTask = {
                id: newId, start: '00:00', end: '00:00', title: '點擊編輯任務標題',
                content: '點擊編輯任務內容...', note: '', subSteps: []
            };
            dailyScheduleData.push(newTask);
            saveScheduleToCloud();
            renderDailySchedule();
            window.showToast("已新增任務卡片");
        };

        window.addSubTask = (taskId, event) => {
            if (event) event.stopPropagation();
            const task = dailyScheduleData.find(t => t.id === taskId);
            if (task) {
                if (!task.subSteps) task.subSteps = [];
                task.subSteps.push("點擊編輯新增的子任務");
                expandedTasksState[taskId] = true; 
                saveScheduleToCloud();
                renderDailySchedule();
                window.showToast("已新增子任務");
            }
        };

        window.deleteSubTask = (taskId, subIdx, event) => {
            if (event) event.stopPropagation();
            const task = dailyScheduleData.find(t => t.id === taskId);
            if (task && task.subSteps) {
                task.subSteps.splice(subIdx, 1);
                saveScheduleToCloud();
                renderDailySchedule();
                window.showToast("已刪除子任務");
            }
        };

        window.exportData = async () => {
            window.showToast("準備導出資料...");
            try {
                const exportPayload = {
                    version: "4.0",
                    exportDate: new Date().toISOString(),
                    dailyScheduleData,
                    taskCompletionState,
                    taskExtrasState,
                    taskArchiveState,
                    subTaskCompletionState,
                    galleryCategories,
                    galleryItems
                };
                
                const blob = new Blob([JSON.stringify(exportPayload, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `工作記錄本_備份_${new Date().toISOString().slice(0,10)}.json`;
                a.click();
                window.showToast("導出成功！已儲存至下載資料夾");
            } catch (error) {
                window.showToast("導出失敗", true);
            }
        };

        lucide.createIcons();

        window.showToast = (message, isError = false) => {
            const toast = document.createElement('div');
            toast.className = `fixed top-16 left-1/2 transform -translate-x-1/2 px-5 py-3 rounded-full shadow-lg text-sm font-semibold z-50 transition-all duration-300 ${isError ? 'bg-red-500 text-white' : 'bg-slate-800 text-white'}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, -20px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        async function initAuth() {
            try {
                // 優先載入畫面
                loadLocalData();
                
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
                window.showToast("連線驗證失敗", true);
            }
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                connectionDot.classList.replace('bg-red-500', 'bg-green-500');
                connectionStatus.textContent = '系統已連線並同步';
                setupFirestoreListener();
            } else {
                connectionDot.classList.replace('bg-green-500', 'bg-red-500');
                connectionStatus.textContent = '連線中或驗證失敗...';
                if (unsubscribeSnapshot) unsubscribeSnapshot();
                if (unsubscribeImagesSnapshot) unsubscribeImagesSnapshot();
            }
        });

        function setupFirestoreListener() {
            if (!currentUser) return;
            
            const stepsRef = collection(db, 'artifacts', appId, 'public', 'data', 'workflow_steps');
            const imagesRef = collection(db, 'artifacts', appId, 'public', 'data', 'workflow_images');
            
            // 原有的自訂流程監聽
            unsubscribeSnapshot = onSnapshot(stepsRef, (snapshot) => {
                const fetchedSteps = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                steps = fetchedSteps.map(fetchedStep => {
                    const existingStep = steps.find(s => s.id === fetchedStep.id);
                    return { ...fetchedStep, image: existingStep ? existingStep.image : null };
                });
                
                steps.sort((a, b) => a.order - b.order);
                renderSteps();
                if(addBoxBtn) addBoxBtn.disabled = false;
            }, (error) => {
                if(addBoxBtn) addBoxBtn.disabled = false;
                if (error.code === 'permission-denied') {
                    window.showToast("權限不足", true);
                }
            });

            unsubscribeImagesSnapshot = onSnapshot(imagesRef, (snapshot) => {
                let hasChanges = false;
                snapshot.docChanges().forEach((change) => {
                    const stepId = change.doc.id;
                    const stepIndex = steps.findIndex(s => s.id === stepId);
                    
                    if (change.type === "added" || change.type === "modified") {
                        const imgData = change.doc.data().image;
                        if (stepIndex !== -1 && steps[stepIndex].image !== imgData) {
                            steps[stepIndex].image = imgData;
                            hasChanges = true;
                        }
                    }
                    if (change.type === "removed") {
                        if (stepIndex !== -1 && steps[stepIndex].image !== null) {
                            steps[stepIndex].image = null;
                            hasChanges = true;
                        }
                    }
                });
                if (hasChanges) {
                    renderSteps();
                }
            });

            // 🌟 雲端全方位同步監聽 + 雙層快取存入 🌟
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'schedule'), (docSnap) => {
                if(docSnap.exists()) { 
                    const newData = docSnap.data().tasks;
                    if(JSON.stringify(dailyScheduleData) !== JSON.stringify(newData)) {
                        dailyScheduleData = newData; 
                        localStorage.setItem('work_cache_schedule', JSON.stringify(dailyScheduleData));
                        renderDailySchedule(); 
                    }
                }
            });
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'task_states'), (docSnap) => {
                if(docSnap.exists()) { 
                    const newData = docSnap.data().states || {};
                    if(JSON.stringify(taskCompletionState) !== JSON.stringify(newData)) {
                        taskCompletionState = newData; 
                        localStorage.setItem('work_cache_task_states', JSON.stringify(taskCompletionState));
                        renderDailySchedule(); 
                    }
                }
            });
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'subtask_states'), (docSnap) => {
                if(docSnap.exists()) { 
                    const newData = docSnap.data().states || {};
                    if(JSON.stringify(subTaskCompletionState) !== JSON.stringify(newData)) {
                        subTaskCompletionState = newData; 
                        localStorage.setItem('work_cache_subtask_states', JSON.stringify(subTaskCompletionState));
                        renderDailySchedule(); 
                    }
                }
            });
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'gallery_categories'), (docSnap) => {
                if(docSnap.exists()) { 
                    const newData = docSnap.data().categories || ['全部', '未分類', '街市檔口', '鮮風機', '價格表', '其他'];
                    if(JSON.stringify(galleryCategories) !== JSON.stringify(newData)) {
                        galleryCategories = newData;
                        localStorage.setItem('work_cache_gallery_categories', JSON.stringify(galleryCategories));
                        window.renderGallery(); 
                    }
                }
            });

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'daily_extras'), (snapshot) => {
                let hasChanges = false;
                snapshot.docs.forEach(docSnap => { 
                    if(JSON.stringify(taskExtrasState[docSnap.id]) !== JSON.stringify(docSnap.data())) {
                        taskExtrasState[docSnap.id] = docSnap.data(); 
                        hasChanges = true;
                    }
                });
                if(hasChanges) {
                    localStorage.setItem('work_cache_daily_extras', JSON.stringify(taskExtrasState));
                    renderDailySchedule();
                }
            });

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'daily_archive'), (snapshot) => {
                let hasChanges = false;
                snapshot.docs.forEach(docSnap => { 
                    if(JSON.stringify(taskArchiveState[docSnap.id]) !== JSON.stringify(docSnap.data().archive || [])) {
                        taskArchiveState[docSnap.id] = docSnap.data().archive || []; 
                        hasChanges = true;
                    }
                });
                if(hasChanges) {
                    localStorage.setItem('work_cache_daily_archive', JSON.stringify(taskArchiveState));
                    renderDailySchedule();
                }
            });

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'gallery_items'), (snapshot) => {
                const newData = snapshot.docs.map(docSnap => docSnap.data());
                newData.sort((a,b) => {

                    const idB = b.id || '';
                    return idB.localeCompare(idA);

                if(JSON.stringify(galleryItems) !== JSON.stringify(newData)) {

            migrateLocalToCloud();
        }

        // 🌟 終極修復：強制退回使用最穩定的 JPEG 引擎，並且適度壓縮避免塞爆雲端
        function compressImageAsync(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 700; // 安全尺寸
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_SIZE) {
                                height *= MAX_SIZE / width;
                                width = MAX_SIZE;
                            }
                        } else {
                            if (height > MAX_SIZE) {
                                width *= MAX_SIZE / height;
                                height = MAX_SIZE;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'medium';
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // 降級為相容性 100% 的 jpeg，壓縮比設為 0.6 (約 30-80KB)
                        resolve(canvas.toDataURL('image/jpeg', 0.6)); 
                    };
                    img.onerror = () => reject(new Error("圖片解析失敗"));
                };
                reader.onerror = () => reject(new Error("檔案讀取失敗"));
            });
        }

        window.addStep = async () => {
            if (!currentUser) return;
            const newId = Date.now().toString();
            const newOrder = steps.length > 0 ? Math.max(...steps.map(s => s.order)) + 1 : 0;
            const stepData = { image: null, note: '', order: newOrder };

            steps.push({ id: newId, ...stepData });
            renderSteps();

            try {
                const stepRef = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', newId);
                await setDoc(stepRef, stepData);
            } catch (err) {
                window.showToast("新增至雲端失敗", true);
            }
        };

        window.handleImageUpload = async (id, inputElement) => {
            const file = inputElement.files[0];
            if (!file) return;
            if (!currentUser) return;

            const stepElement = document.getElementById(`step-${id}`);
            if(stepElement) stepElement.classList.add('opacity-50');
            window.showToast("處理圖片中...");

            try {
                const compressedBase64 = await compressImageAsync(file);
                const stepIndex = steps.findIndex(s => s.id === id);
                if(stepIndex !== -1) {
                    steps[stepIndex].image = compressedBase64;
                    renderSteps(); 
                }

                const imageRef = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_images', id);
                await setDoc(imageRef, { image: compressedBase64 });
                window.showToast("圖片上傳成功");
            } catch (error) {
                if (error.code === 'resource-exhausted') {
                    window.showToast("圖片超過雲端大小限制，請嘗試更換圖片", true);
                } else {
                    window.showToast("圖片上傳失敗：" + error.message, true);
                }
            } finally {
                if(stepElement) stepElement.classList.remove('opacity-50');
                inputElement.value = '';
            }
        };

            if (!currentUser) return;
            const stepIndex = steps.findIndex(s => s.id === id);
            if(stepIndex !== -1) {
                steps[stepIndex].image = null;
                renderSteps();
            }
            const imageRef = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_images', id);
            await deleteDoc(imageRef);

        window.deleteStep = async (id) => {
            if (!currentUser) return;
            steps = steps.filter(s => s.id !== id);
            renderSteps();

                const stepRef = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', id);

        window.moveUp = async (index) => {
            if (!currentUser || index === 0) return;
            const step1 = steps[index];
            const step2 = steps[index - 1];
            const tempOrder = step1.order;
            step1.order = step2.order;
            step2.order = tempOrder;
            steps.sort((a, b) => a.order - b.order);
            renderSteps();

            const ref1 = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', step1.id);
            const ref2 = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', step2.id);
            await setDoc(ref1, { order: step1.order }, { merge: true });
            await setDoc(ref2, { order: step2.order }, { merge: true });
        };

        window.moveDown = async (index) => {
            if (!currentUser || index === steps.length - 1) return;
            const step1 = steps[index];
            const step2 = steps[index + 1];
            const tempOrder = step1.order;
            step1.order = step2.order;
            step2.order = tempOrder;
            steps.sort((a, b) => a.order - b.order);
            renderSteps();

            const ref1 = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', step1.id);
            const ref2 = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', step2.id);
            await setDoc(ref1, { order: step1.order }, { merge: true });
            await setDoc(ref2, { order: step2.order }, { merge: true });
        };

        function parseTime(timeStr) {
            const [hours, minutes] = timeStr.split(':').map(Number);
            const now = new Date();
            now.setHours(hours, minutes, 0, 0);
            return now;
        }

        function calculateTaskStatus(startStr, endStr) {
            const now = new Date();
            const start = parseTime(startStr);
            const end = parseTime(endStr);
            
            if (now < start) {
                const diffMins = Math.floor((start - now) / 60000);
                const h = Math.floor(diffMins / 60);
                const m = diffMins % 60;
                return { state: 'waiting', text: `未開始 (約 ${h > 0 ? h + '小時' : ''}${m}分後)` };
            } else if (now >= start && now <= end) {
                const diffMins = Math.floor((end - now) / 60000);
                const h = Math.floor(diffMins / 60);
                const m = diffMins % 60;
                return { state: 'active', text: `進行中 (剩餘 ${h > 0 ? h + '小時' : ''}${m}分)` };
            } else {
                const diffMins = Math.floor((now - end) / 60000);
                const h = Math.floor(diffMins / 60);
                const m = diffMins % 60;
                return { state: 'overdue', text: `已結束 (超時 ${h > 0 ? h + '小時' : ''}${m}分)` };
            }
        }

            const percentText = document.getElementById('hudPercentage');
            const countText = document.getElementById('hudTaskCount');
            
            if(ring && percentText && countText) {
                const circumference = 2 * Math.PI * 40;
                const offset = circumference - (percentage / 100) * circumference;
                ring.style.strokeDashoffset = offset;

                countText.textContent = `${completedTasks}/${totalTasks}`;
                
                if (percentage === 100) {
                    ring.classList.replace('text-blue-500', 'text-green-500');

                                <!-- 子流程展開按鈕與內容 -->
                                ${(task.subSteps && task.subSteps.length > 0) || isEdit ? `
                                    <div class="mt-3 flex justify-center relative z-20">
                                        <button type="button" onclick="window.toggleTaskDetails('${task.id}', event)" class="inline-flex items-center space-x-1 px-4 py-1.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 text-[10px] hover:bg-slate-100 hover:text-slate-800 transition-colors cursor-pointer active:scale-95 shadow-sm">
                                            <i data-lucide="${expandedTasksState[task.id] ? 'chevron-up' : 'list-tree'}" class="w-3.5 h-3.5"></i>
                                            <span class="tracking-widest font-bold">${expandedTasksState[task.id] ? '收起清單' : '展開清單'}</span>
                                        </button>
                                    </div>
                                    
                                    <div class="transition-all duration-300 overflow-hidden ${expandedTasksState[task.id] ? 'max-h-[1500px] opacity-100 mt-3 mb-1' : 'max-h-0 opacity-0'}">
                                        <div class="ml-2 relative py-1">
                                            ${(task.subSteps || []).map((step, idx) => {
                                                const subExtras = extras.subTasks?.[idx] || { photos: [], notes: [] };
                                                const isLastSubStep = idx === (task.subSteps || []).length - 1;
                                                const drawLine = !isLastSubStep || isEdit;
                                                
                                                const isSubCompleted = subTaskCompletionState[task.id] && subTaskCompletionState[task.id][idx];
                                                const subStepTextClass = isSubCompleted && !isEdit ? 'line-through text-slate-400 decoration-slate-400' : 'text-slate-700';
                                                
                                                return `
                                                <div class="relative flex flex-col group/step pl-5 ${isLastSubStep && !isEdit ? 'mb-1' : 'mb-6'}">
                                                    
                                                    ${drawLine ? `<div class="absolute left-[3px] top-[14px] bottom-[-30px] w-[1px] border-l border-dashed border-slate-300 z-0 pointer-events-none"></div>` : ''}

                                                    <div class="absolute left-[-2px] top-1.5 w-2.5 h-2.5 rounded-full ${isSubCompleted && !isEdit ? 'bg-slate-300 border-none' : 'bg-white border-2 border-slate-300 group-hover/step:border-blue-400 shadow-sm'} transition-all duration-300 z-10"></div>
                                                    
                                                    <!-- 子任務文字與右側按鈕區 -->
                                                    <div class="flex justify-between items-start relative z-10 w-full group/text">
                                                        <div class="relative flex items-start flex-1 min-w-0" onclick="${!isEdit && !isCompleted ? `window.toggleSubTask('${task.id}', ${idx}, event)` : ''}">
                                                            <p ${editSubAttr(idx)} class="text-[12px] ${subStepTextClass} tracking-wide leading-relaxed pr-2 transition-colors flex-1 ${editClass} ${!isEdit && !isCompleted ? 'cursor-pointer' : ''} select-none">${step}</p>
                                                        </div>
                                                        <div class="flex items-center space-x-2 shrink-0 ml-1 opacity-0 group-hover/step:opacity-100 transition-opacity">
                                                            ${isEdit ? `
                                                            <button type="button" onclick="window.deleteSubTask('${task.id}', ${idx}, event); event.stopPropagation();" class="text-red-400 hover:text-red-500 active:scale-95 transition-transform p-0.5 cursor-pointer">
                                                                <i data-lucide="trash-2" class="w-3.5 h-3.5 pointer-events-none"></i>
                                                            </button>
                                                            ` : `
                                                            ${!isCompleted ? `
                                                            <label class="cursor-pointer text-blue-500 hover:text-blue-600 active:scale-95 transition-transform p-0.5" onclick="event.stopPropagation();">
                                                                <i data-lucide="camera" class="w-3.5 h-3.5"></i>
                                                                <input type="file" accept="image/*" multiple class="hidden" onchange="window.handleSubTaskPhotoUpload('${task.id}', ${idx}, this)" />
                                                            </label>
                                                            <button type="button" onclick="window.toggleSubNoteInput('${task.id}', ${idx}); event.stopPropagation();" class="text-blue-500 hover:text-blue-600 active:scale-95 transition-transform p-0.5">
                                                                <i data-lucide="message-square" class="w-3.5 h-3.5"></i>
                                                            </button>
                                                            ` : ''}
                                                            `}
                                                        </div>
                                                    </div>

                                                    ${!isCompleted ? `
                                                    <div id="subnote-input-container-${task.id}-${idx}" class="hidden mt-1.5 flex h-7 shadow-inner rounded-md opacity-90 w-[85%] ml-1" onclick="event.stopPropagation();">
                                                        <input type="text" id="subnote-input-${task.id}-${idx}" placeholder="輸入筆記..." class="flex-1 bg-white border border-slate-300 border-r-0 rounded-l-md px-2 text-[10px] text-slate-700 placeholder-slate-400 focus:outline-none focus:border-blue-400 tracking-wide w-full min-w-0">
                                                        <button type="button" onclick="window.submitSubTaskNote('${task.id}', ${idx})" class="px-2.5 bg-slate-100 text-slate-600 border border-slate-300 rounded-r-md active:bg-slate-200 transition-colors flex items-center justify-center"><i data-lucide="check" class="w-3.5 h-3.5"></i></button>
                                                    </div>
                                                    ` : ''}

                                                    ${(subExtras.photos?.length > 0 || subExtras.notes?.length > 0) ? `
                                                    <div class="mt-1.5 ml-1 space-y-1.5">
                                                        ${subExtras.photos?.length > 0 ? `
                                                            <div class="flex gap-1.5 overflow-x-auto pb-1 scrollbar-hide">
                                                                ${subExtras.photos.map((p, pIdx) => `
                                                                    <div class="relative w-10 h-10 shrink-0 rounded border border-slate-200 overflow-hidden shadow-sm">
                                                                        <img src="${p}" class="w-full h-full object-cover cursor-pointer" onclick="window.openFullscreenImg('${p}'); event.stopPropagation();"/>
                                                                        ${!isCompleted ? `<button type="button" onclick="window.removeSubTaskPhoto('${task.id}', ${idx}, ${pIdx}); event.stopPropagation();" class="absolute top-0 right-0 bg-red-500/90 text-white p-0.5 rounded-bl active:bg-red-600"><i data-lucide="x" class="w-2.5 h-2.5"></i></button>` : ''}
                                                                    </div>
                                                                `).join('')}
                                                            </div>
                                                        ` : ''}
                                                        
                                                        ${subExtras.notes?.length > 0 ? `
                                                            <div class="space-y-1 w-[90%]">
                                                                ${subExtras.notes.map((n, nIdx) => `
                                                                    <div class="flex justify-between items-start p-1.5 rounded text-[10px] text-slate-700 tracking-wide sticky-note mt-1">
                                                                        <span class="break-words flex-1 pr-2 font-medium">📌 ${n}</span>
                                                                        ${!isCompleted ? `<button type="button" onclick="window.removeSubTaskNote('${task.id}', ${idx}, ${nIdx}); event.stopPropagation();" class="text-red-400 hover:text-red-500 mt-0.5 shrink-0 active:scale-95"><i data-lucide="x" class="w-3 h-3"></i></button>` : ''}
                                                                    </div>
                                                                `).join('')}
                                                            </div>
                                                        ` : ''}
                                                    </div>
                                                    ` : ''}

                                                </div>
                                                `;
                                            }).join('')}
                                            
                                            ${isEdit ? `
                                                <div class="relative flex flex-col pl-5 mt-4">
                                                    <div class="absolute left-[-1.5px] top-1.5 w-2 h-2 rounded-full border border-blue-400 z-10 bg-blue-50"></div>
                                                    <button type="button" onclick="window.addSubTask('${task.id}', event)" class="flex items-center justify-center space-x-1 py-1 px-3 rounded border border-dashed border-blue-300 text-blue-500 hover:bg-blue-50 transition-colors cursor-pointer active:scale-95 text-[10px] tracking-wide relative z-10 max-w-max ml-0.5">
                                                        <i data-lucide="plus" class="w-3 h-3"></i>
                                                        <span>新增一筆子任務</span>
                                                    </button>
                                                </div>
                                            ` : ''}
                                        </div>
                                    </div>
                                ` : ''}
                            </div>
                        </div>

                        ${isEdit ? `
                            <button type="button" onclick="window.deleteTaskCard('${task.id}', event)" class="absolute top-3 right-3 text-slate-400 hover:text-red-500 p-1.5 rounded-full hover:bg-red-50 transition-colors active:scale-95 z-20 cursor-pointer">
                                <i data-lucide="trash-2" class="w-4 h-4 pointer-events-none"></i>
                            </button>
                        ` : ''}

                        <!-- 永遠顯示已附加的相片與筆記 (即使完成任務也不隱藏) -->
                        ${(extras.currentPhotos?.length > 0 || extras.currentNotes?.length > 0) ? `
                        <div class="mt-4 pt-3 border-t border-slate-100 flex flex-col relative z-10 pl-1">
                            ${extras.currentPhotos?.length > 0 ? `
                                <div class="flex gap-2 overflow-x-auto pb-2 mb-1 scrollbar-hide">
                                    ${extras.currentPhotos.map((p, i) => `
                                        <div class="relative w-16 h-16 shrink-0 rounded-md border border-slate-200 overflow-hidden shadow-sm">
                                            <img src="${p}" class="w-full h-full object-cover" onclick="window.openFullscreenImg('${p}')"/>
                                            ${!isCompleted ? `<button type="button" onclick="window.removeCurrentPhoto('${task.id}', ${i}); event.stopPropagation();" class="absolute top-0 right-0 bg-red-500/90 text-white p-1 rounded-bl-md active:bg-red-600"><i data-lucide="x" class="w-3 h-3"></i></button>` : ''}
                                        </div>
                                    `).join('')}
                                </div>
                            ` : ''}
                            
                            ${extras.currentNotes?.length > 0 ? `
                                <div class="space-y-1.5 mb-2">
                                    ${extras.currentNotes.map((n, i) => `
                                        <div class="flex justify-between items-start bg-yellow-50 p-2 rounded-lg border border-yellow-200/50 text-[11px] text-slate-700 tracking-wide ${isCompleted ? 'opacity-60' : ''}">
                                            <span class="break-words flex-1 pr-2 font-medium">📝 ${n}</span>
                                            ${!isCompleted ? `<button type="button" onclick="window.removeCurrentNote('${task.id}', ${i})" class="text-red-400 hover:text-red-500 mt-0.5 shrink-0 active:scale-95"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>` : ''}
                                        </div>
                                    `).join('')}
                                </div>
                            ` : ''}
                        </div>
                        ` : ''}

                        <!-- 輸入框與操作按鈕 -->
                        ${!isCompleted ? `
                        <div class="flex space-x-3 items-stretch mt-1 pl-1 relative z-10 ${!(extras.currentPhotos?.length > 0 || extras.currentNotes?.length > 0) ? 'pt-3 border-t border-slate-100' : ''}">
                            <div class="flex-1 flex flex-col space-y-2 justify-center">
                                <label class="flex items-center justify-center space-x-1 py-1.5 rounded-lg bg-slate-50 border border-slate-200 text-slate-600 hover:text-blue-600 hover:border-blue-300 transition-colors cursor-pointer active:bg-slate-100 text-[11px] tracking-wide w-full shadow-sm">
                                    <i data-lucide="camera" class="w-3.5 h-3.5"></i>
                                    <span>附加存證相片</span>
                                    <input type="file" accept="image/*" multiple class="hidden" onchange="window.handleDailyPhotoUpload('${task.id}', this)" />
                                </label>
                                
                                <div class="flex h-8 shadow-sm rounded-lg">
                                    <input type="text" id="note-input-${task.id}" placeholder="輸入補充筆記..." class="flex-1 bg-white border border-slate-200 border-r-0 rounded-l-lg px-2.5 text-[11px] text-slate-700 placeholder-slate-400 focus:outline-none focus:border-blue-400 tracking-wide w-full min-w-0">
                                    <button type="button" onclick="window.addDailyNote('${task.id}')" class="px-3 bg-slate-100 text-slate-600 border border-slate-200 rounded-r-lg hover:text-blue-600 transition-colors flex items-center justify-center"><i data-lucide="plus" class="w-4 h-4"></i></button>
                                </div>
                            </div>

                            <button type="button" onclick="window.openArchive('${task.id}')" class="w-[60px] shrink-0 flex flex-col items-center justify-center rounded-lg bg-slate-50 border border-slate-200 text-slate-500 hover:text-blue-600 hover:border-blue-300 transition-colors relative active:scale-95 shadow-sm">
                                <i data-lucide="images" class="w-4 h-4 mb-1"></i>
                                <span class="text-[9px] tracking-wide text-center leading-tight">歷史<br>圖庫</span>
                                ${archive.length > 0 ? `<span class="absolute -top-2 -right-2 bg-red-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full shadow-sm border border-white">${archive.length}</span>` : ''}
                            </button>
                        </div>
                        ` : `
                        <div class="mt-3 pt-3 border-t border-slate-100 flex justify-end">
                            <button type="button" onclick="window.openArchive('${task.id}')" class="flex items-center space-x-1 px-3 py-1.5 rounded-md bg-slate-50 border border-slate-200 text-slate-500 active:scale-95 transition-colors hover:text-blue-600 shadow-sm">
                                <i data-lucide="images" class="w-3.5 h-3.5"></i>
                                <span class="text-[10px] tracking-wide font-medium">查看歷史圖庫 (${archive.length})</span>
                            </button>
                        </div>
                        `}
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', taskHTML);
            });
            
            if (window.isEditMode) {
                const addTaskBtnHTML = `
                    <div class="mt-6 flex justify-center pb-4">
                        <button type="button" onclick="window.addNewTaskCard()" class="w-full bg-white rounded-2xl p-5 border-2 border-dashed border-blue-300 text-blue-500 hover:bg-blue-50 transition-all duration-300 flex flex-col items-center justify-center active:scale-[0.98] group shadow-sm cursor-pointer">
                            <i data-lucide="plus-circle" class="w-7 h-7 mb-2 group-hover:scale-110 transition-transform"></i>
                            <span class="text-xs tracking-widest font-bold">新增排程卡片</span>
                        </button>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', addTaskBtnHTML);
            }

            lucide.createIcons();

            if(timeUpdateInterval) clearInterval(timeUpdateInterval);
            timeUpdateInterval = setInterval(() => {
                if(!document.getElementById('dailySchedulePage').classList.contains('hidden') && !window.isEditMode) {
                    dailyScheduleData.forEach(task => {
                        const isCompleted = taskCompletionState[task.id];
                        if (!isCompleted) {
                            const status = calculateTaskStatus(task.start, task.end);
                            const statusEl = document.getElementById(`status-text-${task.id}`);
                            if (statusEl) {
                                statusEl.textContent = status.text;
                                if (status.state === 'active') {
                                    statusEl.className = 'text-[11px] text-blue-600 font-bold ml-2 text-right tracking-wide';
                                } else if (status.state === 'overdue') {
                                    statusEl.className = 'text-[11px] text-red-500 font-bold ml-2 text-right tracking-wide';
                                } else {
                                    statusEl.className = 'text-[11px] text-slate-400 font-bold ml-2 text-right tracking-wide';
                                }
                            }
                        }
                    });
                }
            }, 60000); 

            // 卡片焦點特效
            setTimeout(() => {
                const cards = document.querySelectorAll('.daily-task-card');
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting && !window.isEditMode && !entry.target.innerHTML.includes('任務完成')) {
                            entry.target.classList.add('card-focused');
                        } else {
                            entry.target.classList.remove('card-focused');
                        }
                    });
                }, { root: null, rootMargin: "-35% 0px -35% 0px", threshold: 0 });
                cards.forEach(card => observer.observe(card));
            }, 100);
        }

        // ==========================================
        // 初始化與載入邏輯
        // ==========================================
        
        // 第一步：一打開網頁，什麼都不要等，先從快取把畫面印出來！
        loadLocalData();

        // 第二步：開始背景連線，等連線成功再透過 setupFirestoreListener 更新
        initAuth();
        window.switchTab(localStorage.getItem('activeTab') || 'daily');

    </script>
</head>
<body class="sm:px-4 sm:py-8 flex justify-center relative min-h-screen">

    <!-- Phone Container (Notebook Style) -->
    <div class="w-full max-w-[430px] bg-[#fdfbf7] sm:rounded-[2.5rem] sm:shadow-2xl sm:border-[6px] border-[#d6d0c4] overflow-hidden relative min-h-screen sm:min-h-[932px] pb-10">
        
        <!-- Header -->
        <header class="bg-[#fdfbf7]/95 backdrop-blur-md sticky top-0 z-10 border-b border-[#e5dfd3] p-5 pt-8 sm:pt-12 shadow-sm">
            <div class="flex items-center justify-between relative">
                <div class="w-8"></div> <!-- 平衡用空白 -->
                <h1 class="text-xl text-slate-800 tracking-widest font-black">工作記錄本</h1>
                <button type="button" onclick="window.exportData()" class="w-8 h-8 rounded-full bg-slate-100 border border-slate-200 text-slate-500 hover:text-blue-600 hover:border-blue-300 flex items-center justify-center transition-colors active:scale-95 shadow-sm" title="導出備份資料">
                    <i data-lucide="download" class="w-4 h-4 pointer-events-none"></i>
                </button>
            </div>
            <p class="text-[10px] text-center mt-2 flex items-center justify-center space-x-2 tracking-wide text-slate-500">
                <span id="connectionDot" class="w-2 h-2 rounded-full bg-red-500 transition-colors duration-300"></span>
                <span id="connectionStatus">System Connecting...</span>
            </p>

            <!-- 分頁切換 (Tab Control) -->
            <div class="mt-4 flex bg-[#f0ebe1] rounded-lg p-1 shadow-inner border border-[#e5dfd3] relative z-20">
                <button id="tabCustom" onclick="window.switchTab('custom')" class="flex-1 py-1.5 text-[11px] sm:text-sm text-slate-500 hover:text-slate-700 transition-all uppercase tracking-widest">自訂流程</button>
                <button id="tabDaily" onclick="window.switchTab('daily')" class="flex-1 py-1.5 text-[11px] sm:text-sm rounded-md bg-white text-blue-600 shadow-sm border border-[#d6d0c4] font-semibold transition-all uppercase tracking-widest">每日排程</button>
                <button id="tabGallery" onclick="window.switchTab('gallery')" class="flex-1 py-1.5 text-[11px] sm:text-sm text-slate-500 hover:text-slate-700 transition-all uppercase tracking-widest">更多圖片</button>
            </div>
        </header>

        <!-- Main Content (自訂流程) -->
        <main id="customWorkflowPage" class="p-5 space-y-2 block transition-opacity">
            <div id="stepsContainer"></div>
            <button 
                id="addBoxBtn"
                type="button"
                onclick="window.addStep()"
                disabled
                class="w-full border-2 border-dashed border-slate-300 rounded-2xl p-6 flex flex-col items-center justify-center text-slate-400 hover:text-blue-500 hover:border-blue-300 hover:bg-slate-50 transition-all active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed relative z-10 cursor-pointer bg-white shadow-sm"
            >
                <i data-lucide="plus-circle" class="w-8 h-8 mb-2 pointer-events-none"></i>
                <span class="text-sm font-medium pointer-events-none">新增步驟</span>
            </button>
        </main>
        
        <!-- Main Content (每日排程 - 預設隱藏) -->
        <main id="dailySchedulePage" class="p-5 space-y-2 hidden transition-opacity relative z-10">
            
            <!-- 編輯模式切換開關 -->
            <div class="flex justify-end mb-2 px-1">
                <label class="flex items-center cursor-pointer space-x-2 bg-white px-3 py-1.5 rounded-full border border-slate-200 shadow-sm active:scale-95 transition-transform">
                    <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest transition-colors duration-300" id="editModeLabel">一般檢視模式</span>
                    <div class="relative flex items-center">
                        <input type="checkbox" id="editModeToggle" class="sr-only" onchange="window.toggleEditMode(this.checked)">
                        <div class="block bg-slate-300 w-9 h-5 rounded-full border border-slate-300 transition-colors duration-300 shadow-inner" id="editToggleBg"></div>
                        <div class="dot absolute left-1 bg-white w-3 h-3 rounded-full transition-transform duration-300 shadow-sm" id="editToggleDot"></div>
                    </div>
                </label>
            </div>

            <div id="hudContainer" class="flex flex-col items-center justify-center mb-6 p-5 bg-white rounded-2xl border border-slate-200 shadow-sm relative overflow-hidden">
                <div class="relative w-32 h-32 mb-2 z-10">
                    <svg class="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="40" fill="none" stroke="currentColor" class="text-slate-100" stroke-width="8"></circle>
                        <circle id="hudProgressRing" cx="50" cy="50" r="40" fill="none" stroke="currentColor" class="text-blue-500 hud-ring drop-shadow-sm" stroke-width="8" stroke-dasharray="251.2" stroke-dashoffset="251.2" stroke-linecap="round"></circle>
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                        <span id="hudPercentage" class="text-2xl text-slate-800 font-black tracking-wider mt-1">0%</span>
                        <span class="text-[9px] text-slate-500 tracking-widest font-bold mt-0.5">達成率</span>
                    </div>
                </div>
                <div class="text-[11px] text-slate-600 tracking-wide flex items-center justify-center space-x-2 bg-slate-50 px-4 py-1.5 rounded-full border border-slate-200 z-10">
                    <i data-lucide="check-circle" class="w-4 h-4 text-blue-500"></i>
                    <span>已完成任務: <span id="hudTaskCount" class="text-blue-600 font-bold ml-1">0/14</span></span>
                </div>
            </div>

            <div id="scheduleContainer" class="space-y-4 pb-8"></div>
        </main>

        <!-- Main Content (獨立圖庫存檔 - 全新分頁) -->
        <main id="galleryPage" class="hidden h-[calc(100vh-140px)] sm:h-[750px] flex-col relative z-10 bg-[#fdfbf7]">
            <!-- 搜尋與上傳區 (Header) -->
            <div class="p-3 border-b border-[#e6e2d6] flex space-x-2 bg-white shrink-0 shadow-sm z-20 relative">
                <div class="relative flex-1">
                    <i data-lucide="search" class="absolute left-2.5 top-2.5 w-4 h-4 text-slate-400"></i>
                    <input type="text" id="gallerySearchInput" placeholder="搜尋圖片標題或日期..." oninput="window.renderGallery()" class="w-full bg-slate-50 border border-slate-200 rounded-lg pl-8 pr-3 py-2 text-xs text-slate-700 placeholder-slate-400 focus:border-blue-400 focus:bg-white focus:outline-none tracking-wide">
                </div>
                <label class="bg-blue-50 text-blue-600 border border-blue-200 px-3 py-2 rounded-lg flex items-center justify-center cursor-pointer active:bg-blue-100 text-[11px] font-bold tracking-wide transition-colors shadow-sm">
                    <i data-lucide="upload" class="w-4 h-4 mr-1"></i> 上傳
                    <input type="file" accept="image/*" multiple class="hidden" onchange="window.handleGalleryUpload(this)">
                </label>
            </div>
            
            <div class="flex flex-1 overflow-hidden relative z-10">
                <!-- 左側分類列 -->
                <div class="w-[75px] shrink-0 border-r border-[#e6e2d6] bg-[#f4f1eb] overflow-y-auto flex flex-col items-center space-y-2 scrollbar-hide" id="gallerySidebar">
                </div>
                <!-- 右側圖片網格 -->
                <div class="flex-1 p-3 overflow-y-auto bg-[#fdfbf7] relative scrollbar-hide" id="galleryGrid">
                </div>
            </div>
        </main>

    </div>

    <!-- 更多圖片 Modal (彈窗介面) -->
    <div id="archiveModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center p-4">
        <div class="bg-white border border-slate-200 shadow-2xl rounded-2xl w-full max-w-[400px] max-h-[80vh] flex flex-col overflow-hidden relative">
            <header class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h2 class="text-slate-800 font-bold tracking-widest text-base flex items-center"><i data-lucide="images" class="w-5 h-5 mr-2 text-blue-500"></i> 歷史圖庫</h2>
                <button onclick="window.closeArchive()" class="text-slate-400 p-1.5 rounded-full hover:bg-slate-200 active:scale-95 transition-all"><i data-lucide="x" class="w-6 h-6"></i></button>
            </header>
            <div id="archiveContent" class="flex-1 overflow-y-auto p-4 pb-6 scrollbar-hide bg-[#fdfbf7]">
            </div>
        </div>
    </div>

    <!-- 圖片放大預覽 Modal -->
    <div id="imageViewer" class="fixed inset-0 bg-black/95 z-[200] hidden flex-col items-center justify-center p-4">
        <button onclick="document.getElementById('imageViewer').classList.add('hidden'); document.getElementById('imageViewer').classList.remove('flex');" class="absolute top-6 right-6 text-white bg-slate-800/80 p-2 rounded-full active:scale-95 shadow-lg border border-slate-600">
            <i data-lucide="x" class="w-6 h-6"></i>
        </button>
        <img id="imageViewerImg" src="" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl border border-slate-700" />
    </div>

    <!-- 管理分類 Modal -->
    <div id="categoryManageModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[250] hidden flex-col items-center justify-center p-4">
        <div class="bg-white border border-slate-200 shadow-2xl rounded-2xl w-full max-w-[320px] flex flex-col overflow-hidden relative">
            <header class="p-3.5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h2 class="text-slate-800 font-bold tracking-widest text-sm flex items-center"><i data-lucide="settings-2" class="w-4 h-4 mr-2 text-blue-500"></i> 管理圖庫分類</h2>
                <button onclick="window.closeCategoryManager()" class="text-slate-400 p-1.5 rounded-full hover:bg-slate-200 active:scale-95 transition-all"><i data-lucide="x" class="w-5 h-5"></i></button>
            </header>
            <div id="categoryManageList" class="p-3 overflow-y-auto max-h-[55vh] bg-[#fdfbf7] space-y-2 scrollbar-hide">
                <!-- 動態注入分類列表 -->
            </div>
        </div>
    </div>

</body>
</html>
