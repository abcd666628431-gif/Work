<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工作順序流程</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        // Firebase Configuration
        const userFirebaseConfig = {
            apiKey: "AIzaSyBsdBYBeJYqgeDDxF39lZ0pr785SMnwvJs",
            authDomain: "work-eb62f.firebaseapp.com",
            databaseURL: "https://work-eb62f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "work-eb62f",
            storageBucket: "work-eb62f.firebasestorage.app",
            messagingSenderId: "428210130706",
            appId: "1:428210130706:web:142207595423bdf661adcb"
        };

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : userFirebaseConfig;
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // State Management
        let steps = [];
        let currentUser = null;
        let unsubscribeSnapshot = null;

        // DOM Elements
        const loadingMask = document.getElementById('loadingMask');
        const connectionStatus = document.getElementById('connectionStatus');
        const connectionDot = document.getElementById('connectionDot');
        const stepsContainer = document.getElementById('stepsContainer');
        const addBoxBtn = document.getElementById('addBoxBtn');

        // Initialize Icons
        lucide.createIcons();

        // 系統提示框 (Toast)
        window.showToast = (message, isError = false) => {
            const toast = document.createElement('div');
            toast.className = `fixed top-16 left-1/2 transform -translate-x-1/2 px-5 py-3 rounded-full shadow-2xl text-sm font-bold z-50 transition-all duration-300 ${isError ? 'bg-rose-500 text-white' : 'bg-indigo-600 text-white'}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            // 動畫效果
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, -20px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        // Authentication
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
                window.showToast("Firebase 驗證失敗，請檢查設定", true);
            }
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                connectionDot.classList.replace('bg-rose-500', 'bg-emerald-500');
                connectionStatus.textContent = '已連線並同步';
                setupFirestoreListener();
            } else {
                connectionDot.classList.replace('bg-emerald-500', 'bg-rose-500');
                connectionStatus.textContent = '連線中或驗證失敗...';
                if (unsubscribeSnapshot) unsubscribeSnapshot();
            }
        });

        // Firestore Listener
        function setupFirestoreListener() {
            if (!currentUser) return;
            
            // 【修改】：將儲存路徑從個人私密資料夾改為應用程式的公共資料夾
            const stepsRef = collection(db, 'artifacts', appId, 'public', 'data', 'workflow_steps');
            
            unsubscribeSnapshot = onSnapshot(stepsRef, (snapshot) => {
                steps = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                steps.sort((a, b) => a.order - b.order);
                renderSteps();
                loadingMask.style.display = 'none';
                addBoxBtn.disabled = false;
            }, (error) => {
                console.error("Firestore Error:", error);
                loadingMask.style.display = 'none';
                addBoxBtn.disabled = false;
                
                if (error.code === 'permission-denied') {
                    window.showToast("資料庫權限不足！請去 Firebase 開啟 Rules", true);
                } else {
                    window.showToast("資料同步錯誤: " + error.message, true);
                }
            });
        }

        // Image Compression (高清晰度平衡版)
        function compressImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        // 【更新】將最大寬度提升至 1200px，保留工作細節
                        const MAX_WIDTH = 1200; 
                        let scaleSize = 1;
                        if (img.width > MAX_WIDTH) {
                            scaleSize = MAX_WIDTH / img.width;
                        }
                        canvas.width = img.width * scaleSize;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        // 【更新】改回 JPEG 格式並將畫質提升至 0.8 (80%)，兼顧高清晰度與資料庫限制
                        resolve(canvas.toDataURL('image/jpeg', 0.8)); 
                    };
                    img.onerror = () => reject(new Error("圖片解析失敗"));
                };
                reader.onerror = () => reject(new Error("檔案讀取失敗"));
            });
        }

        // Actions
        window.addStep = async () => {
            if (!currentUser) {
                window.showToast("未連線到資料庫，無法新增", true);
                return;
            }
            const newId = Date.now().toString();
            const newOrder = steps.length > 0 ? Math.max(...steps.map(s => s.order)) + 1 : 0;
            const stepData = { image: null, note: '', order: newOrder };

            // Optimistic UI (先在畫面加上去，讓操作不卡頓)
            steps.push({ id: newId, ...stepData });
            renderSteps();

            try {
                // 【修改】
                const stepRef = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', newId);
                await setDoc(stepRef, stepData);
            } catch (err) {
                window.showToast("新增至雲端失敗", true);
            }
        };

        window.handleImageUpload = async (id, inputElement) => {
            const file = inputElement.files[0];
            if (!file) return;

            if (!currentUser) {
                window.showToast("未連線，無法上傳圖片", true);
                return;
            }

            // 讓該區塊變半透明表示處理中
            const stepElement = document.getElementById(`step-${id}`);
            if(stepElement) stepElement.classList.add('opacity-50');
            window.showToast("處理圖片中...");

            try {
                // 1. 壓縮圖片
                const compressedBase64 = await compressImage(file);
                
                // 2. 樂觀更新 (Optimistic UI) - 讓畫面【瞬間】顯示圖片！
                const stepIndex = steps.findIndex(s => s.id === id);
                if(stepIndex !== -1) {
                    steps[stepIndex].image = compressedBase64;
                    renderSteps(); // 立刻重新渲染畫面
                }

                // 3. 背景慢慢上傳到 Firebase
                // 【修改】
                const stepRef = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', id);
                await setDoc(stepRef, { image: compressedBase64 }, { merge: true });
                window.showToast("圖片上傳成功");
                
            } catch (error) {
                console.error("Upload error:", error);
                window.showToast("圖片上傳失敗：" + error.message, true);
            } finally {
                if(stepElement) stepElement.classList.remove('opacity-50');
                // 清空 input，這樣下次選同一張圖也能再次觸發 onchange
                inputElement.value = '';
            }
        };

        window.removeImage = async (id) => {
            if (!currentUser) return;
            
            // 樂觀更新：立刻移除畫面圖片
            const stepIndex = steps.findIndex(s => s.id === id);
            if(stepIndex !== -1) {
                steps[stepIndex].image = null;
                renderSteps();
            }

            // 【修改】
            const stepRef = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', id);
            await setDoc(stepRef, { image: null }, { merge: true });
        };

        window.handleNoteChange = (id, text) => {
             const stepIndex = steps.findIndex(s => s.id === id);
             if(stepIndex !== -1) {
                 steps[stepIndex].note = text;
             }
        }

        window.handleNoteBlur = async (id, text) => {
            if (!currentUser) return;
            try {
                // 【修改】
                const stepRef = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', id);
                await setDoc(stepRef, { note: text }, { merge: true });
            } catch (err) {
                window.showToast("備註儲存失敗", true);
            }
        };

        window.deleteStep = async (id) => {
            if (!currentUser) return;
            
            // 樂觀更新：立刻移除畫面步驟
            steps = steps.filter(s => s.id !== id);
            renderSteps();

            try {
                // 【修改】
                const stepRef = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', id);
                await deleteDoc(stepRef);
            } catch (err) {
                window.showToast("刪除失敗", true);
            }
        };

        window.moveUp = async (index) => {
            if (!currentUser || index === 0) return;
            const step1 = steps[index];
            const step2 = steps[index - 1];

            // 樂觀更新：立刻調換順序
            const tempOrder = step1.order;
            step1.order = step2.order;
            step2.order = tempOrder;
            steps.sort((a, b) => a.order - b.order);
            renderSteps();

            // 【修改】
            const ref1 = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', step1.id);
            const ref2 = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', step2.id);
            await setDoc(ref1, { order: step1.order }, { merge: true });
            await setDoc(ref2, { order: step2.order }, { merge: true });
        };

        window.moveDown = async (index) => {
            if (!currentUser || index === steps.length - 1) return;
            const step1 = steps[index];
            const step2 = steps[index + 1];

            // 樂觀更新：立刻調換順序
            const tempOrder = step1.order;
            step1.order = step2.order;
            step2.order = tempOrder;
            steps.sort((a, b) => a.order - b.order);
            renderSteps();

            // 【修改】
            const ref1 = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', step1.id);
            const ref2 = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', step2.id);
            await setDoc(ref1, { order: step1.order }, { merge: true });
            await setDoc(ref2, { order: step2.order }, { merge: true });
        };

        // Render UI
        function renderSteps() {
            stepsContainer.innerHTML = '';
            
            steps.forEach((step, index) => {
                const isFirst = index === 0;
                const isLast = index === steps.length - 1;
                
                let imageContent = '';
                if (step.image) {
                        imageContent = `
                            <div class="relative rounded-xl overflow-hidden bg-slate-900 border border-slate-700/50">
                                <img src="${step.image}" alt="Step ${index + 1}" class="w-full h-auto object-cover max-h-[300px]" />
                                <button type="button" onclick="window.removeImage('${step.id}')" class="absolute top-2 right-2 p-2 bg-slate-900/80 backdrop-blur-sm rounded-full text-white shadow-lg active:scale-95 z-10 cursor-pointer">
                                    <i data-lucide="trash-2" class="w-4 h-4 pointer-events-none"></i>
                                </button>
                            </div>
                        `;
                    } else {
                        // iOS Safari 專屬修復：使用完全覆蓋的透明 input
                        imageContent = `
                            <div class="flex space-x-3">
                                <div class="relative flex-1 flex flex-col items-center justify-center py-6 px-4 border-2 border-dashed border-slate-600 rounded-xl bg-slate-800/50 active:bg-slate-700 transition-colors cursor-pointer text-slate-400 hover:text-indigo-400 overflow-hidden">
                                    <i data-lucide="camera" class="w-7 h-7 mb-2 pointer-events-none"></i>
                                    <span class="text-xs font-medium pointer-events-none">即時拍照</span>
                                    <input type="file" accept="image/*" capture="environment" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="window.handleImageUpload('${step.id}', this)" />
                                </div>
                                <div class="relative flex-1 flex flex-col items-center justify-center py-6 px-4 border-2 border-dashed border-slate-600 rounded-xl bg-slate-800/50 active:bg-slate-700 transition-colors cursor-pointer text-slate-400 hover:text-indigo-400 overflow-hidden">
                                    <i data-lucide="image" class="w-7 h-7 mb-2 pointer-events-none"></i>
                                    <span class="text-xs font-medium pointer-events-none">從相簿選擇</span>
                                    <input type="file" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="window.handleImageUpload('${step.id}', this)" />
                                </div>
                            </div>
                        `;
                }

                let arrowContent = `
                    <div class="py-3 text-indigo-500/80 flex justify-center w-full">
                        <i data-lucide="arrow-down" class="w-8 h-8 animate-pulse"></i>
                    </div>
                `;

                const stepHTML = `
                    <div id="step-${step.id}" class="flex flex-col items-center transition-opacity duration-200">
                        <div class="w-full bg-slate-800 rounded-2xl p-4 shadow-lg border border-slate-700/50 relative group">
                            
                            <!-- Header -->
                                <div class="flex justify-between items-center mb-4">
                                    <div class="flex items-center space-x-3">
                                        <span class="flex items-center justify-center w-8 h-8 rounded-full bg-indigo-600 text-white font-bold text-sm shadow-md shadow-indigo-900/50">
                                            ${index + 1}
                                        </span>
                                        <span class="text-sm font-medium text-slate-300">步驟 ${index + 1}</span>
                                    </div>
                                    
                                    <div class="flex items-center space-x-1 relative z-10">
                                        <button type="button" onclick="window.moveUp(${index})" ${isFirst ? 'disabled' : ''} class="p-2 rounded-lg ${isFirst ? 'text-slate-600' : 'text-slate-400 active:bg-slate-700 hover:text-white'} cursor-pointer">
                                            <i data-lucide="arrow-up" class="w-4 h-4 pointer-events-none"></i>
                                        </button>
                                        <button type="button" onclick="window.moveDown(${index})" ${isLast ? 'disabled' : ''} class="p-2 rounded-lg ${isLast ? 'text-slate-600' : 'text-slate-400 active:bg-slate-700 hover:text-white'} cursor-pointer">
                                            <i data-lucide="arrow-down" class="w-4 h-4 pointer-events-none"></i>
                                        </button>
                                        <button type="button" onclick="window.deleteStep('${step.id}')" class="p-2 rounded-lg text-rose-400 active:bg-rose-950/50 hover:text-rose-300 cursor-pointer">
                                            <i data-lucide="trash-2" class="w-4 h-4 pointer-events-none"></i>
                                        </button>
                                    </div>
                                </div>

                                <!-- Image Area -->
                                <div class="mb-4 relative">
                                    ${imageContent}
                                </div>

                                <!-- Note Area -->
                            <div>
                                <textarea
                                    placeholder="點此輸入備註內容..."
                                    onchange="window.handleNoteChange('${step.id}', this.value)"
                                    onblur="window.handleNoteBlur('${step.id}', this.value)"
                                    class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-none min-h-[80px]"
                                >${step.note || ''}</textarea>
                            </div>
                        </div>
                        
                        <!-- Arrow -->
                        ${arrowContent}
                    </div>
                `;
                
                stepsContainer.insertAdjacentHTML('beforeend', stepHTML);
            });
            
            // Re-initialize Lucide icons
            lucide.createIcons();
        }

        // Start initialization
        initAuth();

    </script>
</head>
<body class="bg-slate-950 text-slate-200 font-sans sm:px-4 sm:py-8 flex justify-center relative min-h-screen">

    <!-- Loading Mask -->
    <div id="loadingMask" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
        <i data-lucide="loader-2" class="w-12 h-12 text-indigo-500 animate-spin mb-4"></i>
        <p class="text-slate-300 font-medium tracking-widest text-sm">正在載入系統...</p>
    </div>

    <!-- Phone Container -->
    <div class="w-full max-w-[430px] bg-slate-900 sm:rounded-[3rem] sm:shadow-2xl sm:border-[8px] border-slate-800 overflow-hidden relative min-h-screen sm:min-h-[932px] pb-10">
        
        <!-- Header -->
        <header class="bg-slate-900/90 backdrop-blur-md sticky top-0 z-10 border-b border-slate-800 p-5 pt-8 sm:pt-12 shadow-md">
            <div class="flex items-center justify-between">
                <h1 class="text-xl font-bold text-white tracking-wider flex-1 text-center">工作順序流程</h1>
            </div>
            <p class="text-xs text-center mt-1 flex items-center justify-center space-x-2">
                <span id="connectionDot" class="w-2 h-2 rounded-full bg-rose-500 transition-colors duration-300 shadow-sm"></span>
                <span id="connectionStatus" class="text-slate-400">連線中...</span>
            </p>
        </header>

        <!-- Main Content -->
        <main class="p-5 space-y-2">
            
            <div id="stepsContainer">
                <!-- Steps will be dynamically injected here -->
            </div>

            <!-- 新增步驟框框 -->
            <button 
                id="addBoxBtn"
                type="button"
                onclick="window.addStep()"
                disabled
                class="w-full border-2 border-dashed border-slate-600 rounded-2xl p-6 flex flex-col items-center justify-center text-slate-400 hover:text-indigo-400 hover:border-indigo-500 hover:bg-slate-800/50 transition-all active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed relative z-10 cursor-pointer"
            >
                <i data-lucide="plus-circle" class="w-8 h-8 mb-2 pointer-events-none"></i>
                <span class="text-sm font-medium pointer-events-none">新增步驟</span>
            </button>

        </main>
        
    </div>

</body>
</html>
