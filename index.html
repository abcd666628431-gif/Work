<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工作順序流程</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* 科幻終端機特效樣式 (Sci-Fi Effects) */
        .neon-text { text-shadow: 0 0 5px rgba(34, 211, 238, 0.5), 0 0 10px rgba(34, 211, 238, 0.3); }
        .neon-border { box-shadow: 0 0 10px rgba(34, 211, 238, 0.2) inset, 0 0 10px rgba(34, 211, 238, 0.2); }
        .hud-ring { transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1); }
        /* 螢幕掃描線 */
        .scanline {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px; z-index: 50; pointer-events: none; opacity: 0.3;
        }
    </style>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration
        const userFirebaseConfig = {
            apiKey: "AIzaSyBsdBYBeJYqgeDDxF39lZ0pr785SMnwvJs",
            authDomain: "work-eb62f.firebaseapp.com",
            databaseURL: "https://work-eb62f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "work-eb62f",
            storageBucket: "work-eb62f.firebasestorage.app",
            messagingSenderId: "428210130706",
            appId: "1:428210130706:web:142207595423bdf661adcb"
        };

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : userFirebaseConfig;
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // State Management
        let steps = [];
        let currentUser = null;
        let unsubscribeSnapshot = null;

        // DOM Elements
        const loadingMask = document.getElementById('loadingMask');
        const connectionStatus = document.getElementById('connectionStatus');
        const connectionDot = document.getElementById('connectionDot');
        const stepsContainer = document.getElementById('stepsContainer');
        const addBoxBtn = document.getElementById('addBoxBtn');

        // Daily Schedule State
        const dailyScheduleData = [
            { id: 't1', start: '07:00', end: '07:25', title: '開啟鮮風機與豬肉檔巡查', content: '1. 開啟鮮風機,拍照並發送至「紅街市內部溝通群」<br>2. 向有營業的豬肉攤檔派發聲明書,並收集豬肉價格,測豬溫相*6', note: '17:00開,20:00關。測豬溫順檔號。<br>【關係:21號(母)→20號(子)。2、14、26號會遲開】' },
            { id: 't2', start: '07:25', end: '07:30', title: '錄入豬肉價格', content: '完成價格收集及錄入市政署系統內', note: '8:00後致電通知樓上稽查' },
            { id: 't3', start: '07:30', end: '08:30', title: '早更資料與相片發送', content: '1. Whatapps: 返豬相*6, 豬溫相*6<br>2. Wechat: 上班照*5 (客服7人,清潔8人,保安2人,清潔1人,清潔1人)<br>3. 更新豬肉3個表格(總表/營運/十項)', note: '相片留底: 桌面>01及02<br>表格: 公機SHARE內' },
            { id: 't4', start: '08:30', end: '09:25', title: '收集魚/菜/雞/牛肉資料', content: '1. 收魚價、菜價、菜單/菜標、進貨公斤重量<br>2. 收生鮮及冰鮮雞單,影相發送,填雞表<br>3. 收牛價<br>完成價格收集及錄入市政署系統內', note: '生鮮雞相*4(每檔1張不同類)。<br>致電通知樓上稽查。<br>相片留底至桌面>01' },
            { id: 't5', start: '09:30', end: '10:30', title: '巡檔、抄溫與文員工作', content: '1. 剔檔(承租人狀況表)、抄溫度<br>2. 收豬肉紙及拆貨單,寫菜簿、雞簿<br>3. 更新表格(生鮮雞/豬肉檔/蔬菜重量)<br>4. 影豬肉營業相*14發送Whatapps/Wechat<br>5. 埋欄開燈相*2發送Wechat', note: '抄溫時段: 9-11, 11-13, 16-18, 18-20<br>(10:00-10:30) 開燈, (18:00-18:30) 關燈<br>無論有沒有營業都需要拍相' },
            { id: 't6', start: '10:00', end: '13:00', title: '還單與掃描', content: '還單，後掃描豬肉聲明書、菜單、牛肉單、雞單、拆貨單，並按相關格式命名檔案儲至 Share 派單', note: '公機SHARE內' },
            { id: 't7', start: '10:00', end: '19:00', title: '提早收工時段', content: '開始提早收工', note: '' },
            { id: 't8', start: '10:30', end: '11:30', title: '稽查簽署', content: '稽查到客服室簽署菜簿、雞簿、單據等。', note: '' },
            { id: 't9', start: '11:30', end: '12:00', title: '午間剔檔與抄溫', content: '剔檔(承租人親身經營狀況表)、抄溫度', note: '抄溫時段: 9-11, 11-13, 16-18, 18-20' },
            { id: 't10', start: '13:00', end: '14:00', title: '收雞單', content: '收J-022雞單,並掃描 派單', note: '' },
            { id: 't11', start: '16:00', end: '19:00', title: '雞檔收工', content: '雞檔收工時段', note: '' },
            { id: 't12', start: '16:30', end: '17:00', title: '傍晚剔檔與抄溫', content: '剔檔(承租人親身經營狀況表)、抄溫度', note: '抄溫時段: 9-11, 11-13, 16-18, 18-20' },
            { id: 't13', start: '17:30', end: '19:30', title: '豬肉檔收工', content: '豬肉檔收工,入表「街市豬肉檔屠豬及營運資料總表」', note: '公機SHARE內' },
            { id: 't14', start: '18:30', end: '19:00', title: '晚間剔檔與抄溫', content: '剔檔(承租人親身經營狀況表)、抄溫度', note: '抄溫時段: 9-11, 11-13, 16-18, 18-20' }
        ];
        
        // 【新增】跨日自動重置系統 (Auto Reset System)
        // 取得今天的日期字串 (格式 YYYY-MM-DD)
        const getLocalTodayStr = () => {
            const now = new Date();
            // 這裡直接使用本地日期，因為您的最後一個任務約在 20:00 結束
            // 午夜過後 (00:00) 就會自動切換為新的一天
            return now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
        };

        const todayDateStr = getLocalTodayStr();
        const lastSavedDate = localStorage.getItem('dailyTasksDate');

        let taskCompletionState = {};
        let taskExtrasState = {}; // 儲存相片與備註

        if (lastSavedDate !== todayDateStr) {
            // 系統偵測到是新的一天！(或者第一次使用)
            console.log("新的一天開始，初始化排程資料...");
            // 清除昨天的舊資料
            localStorage.removeItem('dailyTasksState');
            localStorage.removeItem('dailyTasksExtras');
            // 更新日期標籤為今天
            localStorage.setItem('dailyTasksDate', todayDateStr);
            // 狀態保持為空 {}，讓畫面呈現全新未完成狀態
        } else {
            // 如果還是同一天，就讀取剛剛/稍早存檔的資料
            taskCompletionState = JSON.parse(localStorage.getItem('dailyTasksState')) || {};
            taskExtrasState = JSON.parse(localStorage.getItem('dailyTasksExtras')) || {};
        }
        
        let timeUpdateInterval;

        // Initialize Icons
        lucide.createIcons();

        // 系統提示框 (Toast)
        window.showToast = (message, isError = false) => {
            const toast = document.createElement('div');
            toast.className = `fixed top-16 left-1/2 transform -translate-x-1/2 px-5 py-3 rounded-full shadow-2xl text-sm font-bold z-50 transition-all duration-300 ${isError ? 'bg-rose-500 text-white' : 'bg-indigo-600 text-white'}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            // 動畫效果
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, -20px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        // Authentication
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
                window.showToast("Firebase 驗證失敗，請檢查設定", true);
            }
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                connectionDot.classList.replace('bg-rose-500', 'bg-emerald-500');
                connectionStatus.textContent = '已連線並同步';
                setupFirestoreListener();
            } else {
                connectionDot.classList.replace('bg-emerald-500', 'bg-rose-500');
                connectionStatus.textContent = '連線中或驗證失敗...';
                if (unsubscribeSnapshot) unsubscribeSnapshot();
            }
        });

        // Firestore Listener
        function setupFirestoreListener() {
            if (!currentUser) return;
            
            // 【修改】：將儲存路徑從個人私密資料夾改為應用程式的公共資料夾
            const stepsRef = collection(db, 'artifacts', appId, 'public', 'data', 'workflow_steps');
            
            unsubscribeSnapshot = onSnapshot(stepsRef, (snapshot) => {
                steps = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                steps.sort((a, b) => a.order - b.order);
                renderSteps();
                loadingMask.style.display = 'none';
                addBoxBtn.disabled = false;
            }, (error) => {
                console.error("Firestore Error:", error);
                loadingMask.style.display = 'none';
                addBoxBtn.disabled = false;
                
                if (error.code === 'permission-denied') {
                    window.showToast("資料庫權限不足！請去 Firebase 開啟 Rules", true);
                } else {
                    window.showToast("資料同步錯誤: " + error.message, true);
                }
            });
        }

        // Image Compression (高清晰度平衡版)
        function compressImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        // 【更新】將最大寬度提升至 1200px，保留工作細節
                        const MAX_WIDTH = 1200; 
                        let scaleSize = 1;
                        if (img.width > MAX_WIDTH) {
                            scaleSize = MAX_WIDTH / img.width;
                        }
                        canvas.width = img.width * scaleSize;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        // 【更新】改回 JPEG 格式並將畫質提升至 0.8 (80%)，兼顧高清晰度與資料庫限制
                        resolve(canvas.toDataURL('image/jpeg', 0.8)); 
                    };
                    img.onerror = () => reject(new Error("圖片解析失敗"));
                };
                reader.onerror = () => reject(new Error("檔案讀取失敗"));
            });
        }

        // Actions
        window.addStep = async () => {
            if (!currentUser) {
                window.showToast("未連線到資料庫，無法新增", true);
                return;
            }
            const newId = Date.now().toString();
            const newOrder = steps.length > 0 ? Math.max(...steps.map(s => s.order)) + 1 : 0;
            const stepData = { image: null, note: '', order: newOrder };

            // Optimistic UI (先在畫面加上去，讓操作不卡頓)
            steps.push({ id: newId, ...stepData });
            renderSteps();

            try {
                // 【修改】
                const stepRef = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', newId);
                await setDoc(stepRef, stepData);
            } catch (err) {
                window.showToast("新增至雲端失敗", true);
            }
        };

        window.handleImageUpload = async (id, inputElement) => {
            const file = inputElement.files[0];
            if (!file) return;

            if (!currentUser) {
                window.showToast("未連線，無法上傳圖片", true);
                return;
            }

            // 讓該區塊變半透明表示處理中
            const stepElement = document.getElementById(`step-${id}`);
            if(stepElement) stepElement.classList.add('opacity-50');
            window.showToast("處理圖片中...");

            try {
                // 1. 壓縮圖片
                const compressedBase64 = await compressImage(file);
                
                // 2. 樂觀更新 (Optimistic UI) - 讓畫面【瞬間】顯示圖片！
                const stepIndex = steps.findIndex(s => s.id === id);
                if(stepIndex !== -1) {
                    steps[stepIndex].image = compressedBase64;
                    renderSteps(); // 立刻重新渲染畫面
                }

                // 3. 背景慢慢上傳到 Firebase
                // 【修改】
                const stepRef = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', id);
                await setDoc(stepRef, { image: compressedBase64 }, { merge: true });
                window.showToast("圖片上傳成功");
                
            } catch (error) {
                console.error("Upload error:", error);
                window.showToast("圖片上傳失敗：" + error.message, true);
            } finally {
                if(stepElement) stepElement.classList.remove('opacity-50');
                // 清空 input，這樣下次選同一張圖也能再次觸發 onchange
                inputElement.value = '';
            }
        };

        window.removeImage = async (id) => {
            if (!currentUser) return;
            
            // 樂觀更新：立刻移除畫面圖片
            const stepIndex = steps.findIndex(s => s.id === id);
            if(stepIndex !== -1) {
                steps[stepIndex].image = null;
                renderSteps();
            }

            // 【修改】
            const stepRef = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', id);
            await setDoc(stepRef, { image: null }, { merge: true });
        };

        window.handleNoteChange = (id, text) => {
             const stepIndex = steps.findIndex(s => s.id === id);
             if(stepIndex !== -1) {
                 steps[stepIndex].note = text;
             }
        }

        window.handleNoteBlur = async (id, text) => {
            if (!currentUser) return;
            try {
                // 【修改】
                const stepRef = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', id);
                await setDoc(stepRef, { note: text }, { merge: true });
            } catch (err) {
                window.showToast("備註儲存失敗", true);
            }
        };

        window.deleteStep = async (id) => {
            if (!currentUser) return;
            
            // 樂觀更新：立刻移除畫面步驟
            steps = steps.filter(s => s.id !== id);
            renderSteps();

            try {
                // 【修改】
                const stepRef = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', id);
                await deleteDoc(stepRef);
            } catch (err) {
                window.showToast("刪除失敗", true);
            }
        };

        window.moveUp = async (index) => {
            if (!currentUser || index === 0) return;
            const step1 = steps[index];
            const step2 = steps[index - 1];

            // 樂觀更新：立刻調換順序
            const tempOrder = step1.order;
            step1.order = step2.order;
            step2.order = tempOrder;
            steps.sort((a, b) => a.order - b.order);
            renderSteps();

            // 【修改】
            const ref1 = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', step1.id);
            const ref2 = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', step2.id);
            await setDoc(ref1, { order: step1.order }, { merge: true });
            await setDoc(ref2, { order: step2.order }, { merge: true });
        };

        window.moveDown = async (index) => {
            if (!currentUser || index === steps.length - 1) return;
            const step1 = steps[index];
            const step2 = steps[index + 1];

            // 樂觀更新：立刻調換順序
            const tempOrder = step1.order;
            step1.order = step2.order;
            step2.order = tempOrder;
            steps.sort((a, b) => a.order - b.order);
            renderSteps();

            // 【修改】
            const ref1 = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', step1.id);
            const ref2 = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', step2.id);
            await setDoc(ref1, { order: step1.order }, { merge: true });
            await setDoc(ref2, { order: step2.order }, { merge: true });
        };

        // Render UI
        function renderSteps() {
            stepsContainer.innerHTML = '';
            
            steps.forEach((step, index) => {
                const isFirst = index === 0;
                const isLast = index === steps.length - 1;
                
                let imageContent = '';
                if (step.image) {
                        imageContent = `
                            <div class="relative rounded-xl overflow-hidden bg-slate-900 border border-slate-700/50">
                                <img src="${step.image}" alt="Step ${index + 1}" class="w-full h-auto object-cover max-h-[300px]" />
                                <button type="button" onclick="window.removeImage('${step.id}')" class="absolute top-2 right-2 p-2 bg-slate-900/80 backdrop-blur-sm rounded-full text-white shadow-lg active:scale-95 z-10 cursor-pointer">
                                    <i data-lucide="trash-2" class="w-4 h-4 pointer-events-none"></i>
                                </button>
                            </div>
                        `;
                    } else {
                        // iOS Safari 專屬修復：使用完全覆蓋的透明 input
                        imageContent = `
                            <div class="flex space-x-3">
                                <div class="relative flex-1 flex flex-col items-center justify-center py-6 px-4 border-2 border-dashed border-slate-600 rounded-xl bg-slate-800/50 active:bg-slate-700 transition-colors cursor-pointer text-slate-400 hover:text-indigo-400 overflow-hidden">
                                    <i data-lucide="camera" class="w-7 h-7 mb-2 pointer-events-none"></i>
                                    <span class="text-xs font-medium pointer-events-none">即時拍照</span>
                                    <input type="file" accept="image/*" capture="environment" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="window.handleImageUpload('${step.id}', this)" />
                                </div>
                                <div class="relative flex-1 flex flex-col items-center justify-center py-6 px-4 border-2 border-dashed border-slate-600 rounded-xl bg-slate-800/50 active:bg-slate-700 transition-colors cursor-pointer text-slate-400 hover:text-indigo-400 overflow-hidden">
                                    <i data-lucide="image" class="w-7 h-7 mb-2 pointer-events-none"></i>
                                    <span class="text-xs font-medium pointer-events-none">從相簿選擇</span>
                                    <input type="file" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="window.handleImageUpload('${step.id}', this)" />
                                </div>
                            </div>
                        `;
                }

                let arrowContent = `
                    <div class="py-3 text-indigo-500/80 flex justify-center w-full">
                        <i data-lucide="arrow-down" class="w-8 h-8 animate-pulse"></i>
                    </div>
                `;

                const stepHTML = `
                    <div id="step-${step.id}" class="flex flex-col items-center transition-opacity duration-200">
                        <div class="w-full bg-slate-800 rounded-2xl p-4 shadow-lg border border-slate-700/50 relative group">
                            
                            <!-- Header -->
                                <div class="flex justify-between items-center mb-4">
                                    <div class="flex items-center space-x-3">
                                        <span class="flex items-center justify-center w-8 h-8 rounded-full bg-indigo-600 text-white font-bold text-sm shadow-md shadow-indigo-900/50">
                                            ${index + 1}
                                        </span>
                                        <span class="text-sm font-medium text-slate-300">步驟 ${index + 1}</span>
                                    </div>
                                    
                                    <div class="flex items-center space-x-1 relative z-10">
                                        <button type="button" onclick="window.moveUp(${index})" ${isFirst ? 'disabled' : ''} class="p-2 rounded-lg ${isFirst ? 'text-slate-600' : 'text-slate-400 active:bg-slate-700 hover:text-white'} cursor-pointer">
                                            <i data-lucide="arrow-up" class="w-4 h-4 pointer-events-none"></i>
                                        </button>
                                        <button type="button" onclick="window.moveDown(${index})" ${isLast ? 'disabled' : ''} class="p-2 rounded-lg ${isLast ? 'text-slate-600' : 'text-slate-400 active:bg-slate-700 hover:text-white'} cursor-pointer">
                                            <i data-lucide="arrow-down" class="w-4 h-4 pointer-events-none"></i>
                                        </button>
                                        <button type="button" onclick="window.deleteStep('${step.id}')" class="p-2 rounded-lg text-rose-400 active:bg-rose-950/50 hover:text-rose-300 cursor-pointer">
                                            <i data-lucide="trash-2" class="w-4 h-4 pointer-events-none"></i>
                                        </button>
                                    </div>
                                </div>

                                <!-- Image Area -->
                                <div class="mb-4 relative">
                                    ${imageContent}
                                </div>

                                <!-- Note Area -->
                            <div>
                                <textarea
                                    placeholder="點此輸入備註內容..."
                                    onchange="window.handleNoteChange('${step.id}', this.value)"
                                    onblur="window.handleNoteBlur('${step.id}', this.value)"
                                    class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-none min-h-[80px]"
                                >${step.note || ''}</textarea>
                            </div>
                        </div>
                        
                        <!-- Arrow -->
                        ${arrowContent}
                    </div>
                `;
                
                stepsContainer.insertAdjacentHTML('beforeend', stepHTML);
            });
            
            // Re-initialize Lucide icons
            lucide.createIcons();
        }

        // Daily Schedule Logic
        window.switchTab = (tab) => {
            const customPage = document.getElementById('customWorkflowPage');
            const dailyPage = document.getElementById('dailySchedulePage');
            const btnCustom = document.getElementById('tabCustom');
            const btnDaily = document.getElementById('tabDaily');

            if (tab === 'custom') {
                customPage.classList.remove('hidden');
                dailyPage.classList.add('hidden');
                btnCustom.className = "flex-1 py-1.5 text-sm rounded-md bg-slate-800 text-cyan-400 shadow-[0_0_10px_rgba(34,211,238,0.2)] border border-cyan-500/50 transition-all uppercase tracking-widest neon-text";
                btnDaily.className = "flex-1 py-1.5 text-sm text-slate-600 hover:text-cyan-200/50 transition-all uppercase tracking-widest";
            } else {
                customPage.classList.add('hidden');
                dailyPage.classList.remove('hidden');
                btnDaily.className = "flex-1 py-1.5 text-sm rounded-md bg-slate-800 text-cyan-400 shadow-[0_0_10px_rgba(34,211,238,0.2)] border border-cyan-500/50 transition-all uppercase tracking-widest neon-text";
                btnCustom.className = "flex-1 py-1.5 text-sm text-slate-600 hover:text-cyan-200/50 transition-all uppercase tracking-widest";
                renderDailySchedule();
            }
        };

        window.toggleTask = (taskId) => {
            taskCompletionState[taskId] = !taskCompletionState[taskId];
            localStorage.setItem('dailyTasksState', JSON.stringify(taskCompletionState));
            renderDailySchedule(); // Re-render to update styles
        };

        // 新增：處理每日任務的相片上傳
        window.handleDailyPhotoUpload = async (taskId, inputElement) => {
            const file = inputElement.files[0];
            if (!file) return;

            window.showToast("壓縮與處理圖片中...");
            try {
                const compressedBase64 = await compressImage(file);
                if (!taskExtrasState[taskId]) taskExtrasState[taskId] = {};
                taskExtrasState[taskId].photo = compressedBase64;
                localStorage.setItem('dailyTasksExtras', JSON.stringify(taskExtrasState));
                renderDailySchedule();
                window.showToast("任務圖片已附加");
            } catch (error) {
                window.showToast("圖片處理失敗", true);
            } finally {
                inputElement.value = '';
            }
        };

        // 新增：移除每日任務相片
        window.removeDailyPhoto = (taskId) => {
            if (taskExtrasState[taskId]) {
                taskExtrasState[taskId].photo = null;
                localStorage.setItem('dailyTasksExtras', JSON.stringify(taskExtrasState));
                renderDailySchedule();
            }
        };

        // 新增：處理改進事項與備註儲存
        window.saveDailyNote = (taskId, noteText) => {
            if (!taskExtrasState[taskId]) taskExtrasState[taskId] = {};
            taskExtrasState[taskId].note = noteText;
            localStorage.setItem('dailyTasksExtras', JSON.stringify(taskExtrasState));
            window.showToast("改進/備註已儲存");
        };

        function parseTime(timeStr) {
            const [hours, minutes] = timeStr.split(':').map(Number);
            const now = new Date();
            now.setHours(hours, minutes, 0, 0);
            return now;
        }

        function calculateTaskStatus(startStr, endStr) {
            const now = new Date();
            const start = parseTime(startStr);
            const end = parseTime(endStr);
            
            if (now < start) {
                const diffMins = Math.floor((start - now) / 60000);
                const h = Math.floor(diffMins / 60);
                const m = diffMins % 60;
                return { state: 'waiting', text: `未開始 (約 ${h > 0 ? h + '小時' : ''}${m}分後)` };
            } else if (now >= start && now <= end) {
                const diffMins = Math.floor((end - now) / 60000);
                const h = Math.floor(diffMins / 60);
                const m = diffMins % 60;
                return { state: 'active', text: `進行中 (剩餘 ${h > 0 ? h + '小時' : ''}${m}分)` };
            } else {
                const diffMins = Math.floor((now - end) / 60000);
                const h = Math.floor(diffMins / 60);
                const m = diffMins % 60;
                return { state: 'overdue', text: `已結束 (超時 ${h > 0 ? h + '小時' : ''}${m}分)` };
            }
        }

        function renderDailySchedule() {
            const container = document.getElementById('scheduleContainer');
            container.innerHTML = '';

            // 1. 動態計算與更新 HUD 數據
            const totalTasks = dailyScheduleData.length;
            const completedTasks = dailyScheduleData.filter(t => taskCompletionState[t.id]).length;
            const percentage = totalTasks === 0 ? 0 : Math.round((completedTasks / totalTasks) * 100);
            
            const ring = document.getElementById('hudProgressRing');
            const percentText = document.getElementById('hudPercentage');
            const countText = document.getElementById('hudTaskCount');
            
            if(ring && percentText && countText) {
                // 圓周長計算 (r=40, C=2*PI*r)
                const circumference = 2 * Math.PI * 40;
                const offset = circumference - (percentage / 100) * circumference;
                ring.style.strokeDashoffset = offset;
                percentText.textContent = `${percentage}%`;
                countText.textContent = `${completedTasks}/${totalTasks}`;
                
                // 顏色動態變換 (達成 100% 變翡翠綠)
                if (percentage === 100) {
                    ring.classList.replace('text-cyan-400', 'text-emerald-400');
                    percentText.classList.replace('text-cyan-400', 'text-emerald-400');
                    document.getElementById('hudContainer').classList.replace('border-cyan-500/30', 'border-emerald-500/30');
                } else {
                    ring.classList.replace('text-emerald-400', 'text-cyan-400');
                    percentText.classList.replace('text-emerald-400', 'text-cyan-400');
                    document.getElementById('hudContainer').classList.replace('border-emerald-500/30', 'border-cyan-500/30');
                }
            }

            dailyScheduleData.forEach(task => {
                const isCompleted = taskCompletionState[task.id];
                const extras = taskExtrasState[task.id] || {};
                const status = calculateTaskStatus(task.start, task.end);
                
                let timeColor = 'text-cyan-600/70';
                let borderColor = 'border-slate-800/80';
                let glowEffect = '';
                let activeScale = '';
                
                if (!isCompleted) {
                    if (status.state === 'active') { 
                        timeColor = 'text-cyan-400 neon-text'; 
                        borderColor = 'border-cyan-500'; 
                        // 針對「正在進行中」的任務做傻瓜式放大與強烈光暈
                        glowEffect = 'shadow-[0_0_20px_rgba(6,182,212,0.3)] bg-slate-800/90 z-10';
                        activeScale = 'scale-[1.02] transform transition-all duration-500';
                    }
                    if (status.state === 'overdue') { 
                        timeColor = 'text-rose-400 drop-shadow-[0_0_5px_rgba(244,63,94,0.8)]'; 
                        borderColor = 'border-rose-500/50'; 
                        glowEffect = 'shadow-[0_0_15px_rgba(244,63,94,0.15)] animate-pulse';
                    }
                }

                const taskHTML = `
                    <div class="bg-slate-900/80 backdrop-blur-md rounded-2xl p-4 border ${isCompleted ? 'border-slate-800/30 opacity-60' : borderColor} ${glowEffect} ${activeScale} relative transition-all duration-300 flex flex-col group hover:bg-slate-800">
                        
                        <!-- 頂部任務資訊 (點擊可打勾) -->
                        <div class="flex space-x-3 cursor-pointer" onclick="window.toggleTask('${task.id}')">
                            <!-- Checkbox Area -->
                            <div class="flex-shrink-0 pt-1">
                                <div class="w-6 h-6 rounded-md border-2 ${isCompleted ? 'border-cyan-500 bg-cyan-500/20 text-cyan-400 drop-shadow-[0_0_5px_rgba(6,182,212,0.8)]' : 'border-slate-600 text-transparent group-hover:border-cyan-500/50'} flex items-center justify-center transition-all duration-300">
                                    <i data-lucide="check" class="w-4 h-4"></i>
                                </div>
                            </div>

                            <!-- Content Area -->
                            <div class="flex-1 space-y-2">
                                <div class="flex justify-between items-start">
                                    <span class="text-[11px] px-2 py-1 bg-slate-950/80 rounded border ${isCompleted ? 'border-slate-800 text-slate-500' : 'border-cyan-900/80 text-cyan-300 shadow-[0_0_8px_rgba(8,145,178,0.2)]'} tracking-widest">${task.start} - ${task.end}</span>
                                    <span class="text-[11px] ${timeColor} tracking-widest font-bold">${isCompleted ? '✔ 已歸檔' : status.text}</span>
                                </div>
                                
                                <h3 class="text-sm tracking-widest ${isCompleted ? 'text-slate-600 line-through' : 'text-cyan-50 drop-shadow-[0_0_2px_rgba(255,255,255,0.3)]'}">${task.title}</h3>
                                <p class="text-[11px] leading-relaxed tracking-wider ${isCompleted ? 'text-slate-700' : 'text-cyan-100/70'}">${task.content}</p>
                                
                                ${task.note ? `<div class="mt-2 p-2 rounded-md bg-cyan-950/20 border border-cyan-800/30 text-[10px] text-cyan-400/80 leading-relaxed uppercase tracking-wider">${task.note}</div>` : ''}
                            </div>
                        </div>

                        <!-- 底部擴充操作區 (防呆工具：相片與備註) -->
                        <div class="mt-4 pt-3 border-t border-slate-800/80 flex flex-col space-y-3">
                            
                            <!-- 圖片顯示區塊 -->
                            ${extras.photo ? `
                                <div class="relative w-full rounded-lg overflow-hidden border border-cyan-900/50">
                                    <img src="${extras.photo}" class="w-full h-32 object-cover opacity-80" />
                                    <button type="button" onclick="window.removeDailyPhoto('${task.id}')" class="absolute top-2 right-2 p-1.5 bg-rose-500/80 rounded-md text-white">
                                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                                    </button>
                                </div>
                            ` : ''}

                            <!-- 功能按鈕列 -->
                            <div class="flex space-x-2">
                                <!-- 附加照片按鈕 -->
                                <label class="flex-1 flex items-center justify-center space-x-1 py-2 rounded-lg bg-slate-950/50 border border-slate-700 text-cyan-500/80 hover:text-cyan-300 hover:border-cyan-500/50 transition-colors cursor-pointer active:scale-95 text-[11px] tracking-widest">
                                    <i data-lucide="camera" class="w-4 h-4"></i>
                                    <span>${extras.photo ? '重新拍照' : '附加存證相片'}</span>
                                    <input type="file" accept="image/*" capture="environment" class="hidden" onchange="window.handleDailyPhotoUpload('${task.id}', this)" />
                                </label>
                            </div>

                            <!-- 異常/改進備註框 -->
                            <textarea
                                placeholder="遇到問題或流程建議？點此記錄改進事項..."
                                onblur="window.saveDailyNote('${task.id}', this.value)"
                                class="w-full bg-slate-950/50 border border-slate-700 rounded-lg p-2.5 text-[11px] text-cyan-100 placeholder-slate-600 focus:outline-none focus:border-cyan-500/50 resize-none min-h-[60px] tracking-widest"
                            >${extras.note || ''}</textarea>
                        </div>

                    </div>
                `;
                container.insertAdjacentHTML('beforeend', taskHTML);
            });

            lucide.createIcons();

            // Refresh timers automatically
            if(timeUpdateInterval) clearInterval(timeUpdateInterval);
            timeUpdateInterval = setInterval(() => {
                if(!document.getElementById('dailySchedulePage').classList.contains('hidden')) {
                    renderDailySchedule(); // lazy auto-update for timers
                }
            }, 60000); // Check every minute
        }

        // Start initialization
        initAuth();

    </script>
</head>
<body class="bg-slate-950 text-cyan-50 font-mono font-black sm:px-4 sm:py-8 flex justify-center relative min-h-screen">

    <!-- 掃描線特效 (Scanline) -->
    <div class="scanline"></div>

    <!-- Loading Mask -->
    <div id="loadingMask" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
        <i data-lucide="loader-2" class="w-12 h-12 text-indigo-500 animate-spin mb-4"></i>
        <p class="text-slate-300 font-medium tracking-widest text-sm">正在載入系統...</p>
    </div>

    <!-- Phone Container -->
    <div class="w-full max-w-[430px] bg-slate-900 sm:rounded-[3rem] sm:shadow-2xl sm:border-[8px] border-slate-800 overflow-hidden relative min-h-screen sm:min-h-[932px] pb-10">
        
        <!-- Header -->
        <header class="bg-slate-900/90 backdrop-blur-md sticky top-0 z-10 border-b border-cyan-900/50 p-5 pt-8 sm:pt-12 shadow-[0_4px_20px_rgba(8,145,178,0.1)]">
            <div class="flex items-center justify-between relative">
                <h1 class="text-xl text-cyan-400 tracking-[0.2em] flex-1 text-center neon-text">工作順序流程</h1>
            </div>
            <p class="text-[10px] text-center mt-2 flex items-center justify-center space-x-2 tracking-widest uppercase text-cyan-600">
                <span id="connectionDot" class="w-2 h-2 rounded-full bg-rose-500 transition-colors duration-300 shadow-[0_0_5px_currentColor]"></span>
                <span id="connectionStatus">System Connecting...</span>
            </p>

            <!-- 分頁切換 (Tab Control) -->
            <div class="mt-4 flex bg-slate-950 rounded-lg p-1 shadow-inner border border-slate-800">
                <button id="tabCustom" onclick="window.switchTab('custom')" class="flex-1 py-1.5 text-sm rounded-md bg-slate-800 text-cyan-400 shadow-[0_0_10px_rgba(34,211,238,0.2)] border border-cyan-500/50 transition-all uppercase tracking-widest neon-text">自訂流程</button>
                <button id="tabDaily" onclick="window.switchTab('daily')" class="flex-1 py-1.5 text-sm text-slate-600 hover:text-cyan-200/50 transition-all uppercase tracking-widest">每日排程</button>
            </div>
        </header>

        <!-- Main Content (自訂流程) -->
        <main id="customWorkflowPage" class="p-5 space-y-2 block transition-opacity">
            
            <div id="stepsContainer">
                <!-- Steps will be dynamically injected here -->
            </div>

            <!-- 新增步驟框框 -->
            <button 
                id="addBoxBtn"
                type="button"
                onclick="window.addStep()"
                disabled
                class="w-full border-2 border-dashed border-slate-600 rounded-2xl p-6 flex flex-col items-center justify-center text-slate-400 hover:text-indigo-400 hover:border-indigo-500 hover:bg-slate-800/50 transition-all active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed relative z-10 cursor-pointer"
            >
                <i data-lucide="plus-circle" class="w-8 h-8 mb-2 pointer-events-none"></i>
                <span class="text-sm font-medium pointer-events-none">新增步驟</span>
            </button>

        </main>
        
        <!-- Main Content (每日排程 - 預設隱藏) -->
        <main id="dailySchedulePage" class="p-5 space-y-2 hidden transition-opacity relative z-10">
            
            <div id="hudContainer" class="flex flex-col items-center justify-center mb-6 p-5 bg-slate-900/60 backdrop-blur-md rounded-2xl border border-cyan-500/30 neon-border">
                <div class="relative w-32 h-32 mb-2">
                    <!-- 背景環 -->
                    <svg class="w-full h-full transform -rotate-90 drop-shadow-lg" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="40" fill="none" stroke="currentColor" class="text-slate-800" stroke-width="6"></circle>
                        <!-- 進度環 (周長約 251.2) -->
                        <circle id="hudProgressRing" cx="50" cy="50" r="40" fill="none" stroke="currentColor" class="text-cyan-400 hud-ring drop-shadow-[0_0_8px_rgba(34,211,238,0.8)]" stroke-width="6" stroke-dasharray="251.2" stroke-dashoffset="251.2" stroke-linecap="round"></circle>
                    </svg>
                    <!-- 百分比文字 -->
                    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                        <span id="hudPercentage" class="text-2xl text-cyan-400 neon-text tracking-wider mt-1">0%</span>
                        <span class="text-[9px] text-cyan-600/80 tracking-widest uppercase mt-0.5">效能指數</span>
                    </div>
                </div>
                <!-- 數據列 -->
                <div class="text-[11px] text-cyan-500/80 tracking-widest flex items-center justify-center space-x-2 bg-slate-950/50 px-4 py-1.5 rounded-full border border-cyan-900/50">
                    <i data-lucide="crosshair" class="w-3.5 h-3.5 text-cyan-400"></i>
                    <span>巡視座標達成: <span id="hudTaskCount" class="text-cyan-300 font-bold ml-1">0/14</span></span>
                </div>
            </div>

            <div id="scheduleContainer" class="space-y-4 pb-8">
                <!-- Daily Schedule will be injected here -->
            </div>
        </main>

    </div>

</body>
</html>
