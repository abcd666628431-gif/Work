        let timeUpdateInterval;

        // Authentication
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {

                } else {
                    await signInAnonymously(auth);

                window.showToast("Firebase 驗證失敗，請檢查設定", true);

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                connectionDot.classList.replace('bg-rose-500', 'bg-emerald-500');

                setupFirestoreListener();

                connectionDot.classList.replace('bg-emerald-500', 'bg-rose-500');

                if (unsubscribeSnapshot) unsubscribeSnapshot();
                if (unsubscribeImagesSnapshot) unsubscribeImagesSnapshot();
            }
        });

        // Firestore Listener
        function setupFirestoreListener() {
            if (!currentUser) return;
            
            // 【修改】：將儲存路徑從個人私密資料夾改為應用程式的公共資料夾
            const stepsRef = collection(db, 'artifacts', appId, 'public', 'data', 'workflow_steps');
            const imagesRef = collection(db, 'artifacts', appId, 'public', 'data', 'workflow_images');
            
            unsubscribeSnapshot = onSnapshot(stepsRef, (snapshot) => {
                const fetchedSteps = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                // 保留現有記憶體中的圖片資料，避免重繪時圖片閃爍
                steps = fetchedSteps.map(fetchedStep => {
                    const existingStep = steps.find(s => s.id === fetchedStep.id);
                    return {
                        ...fetchedStep,
                        image: existingStep ? existingStep.image : null
                    };
                });
                
                steps.sort((a, b) => a.order - b.order);
                renderSteps();
                loadingMask.style.display = 'none';
                addBoxBtn.disabled = false;
            }, (error) => {
                console.error("Firestore Error:", error);
                loadingMask.style.display = 'none';
                addBoxBtn.disabled = false;
                
                if (error.code === 'permission-denied') {
                    window.showToast("資料庫權限不足！請去 Firebase 開啟 Rules", true);
                } else {
                    window.showToast("資料同步錯誤: " + error.message, true);
                }
            });

            // 非同步監聽圖片集合 (雲端關聯讀取 - 分離式儲存)
            unsubscribeImagesSnapshot = onSnapshot(imagesRef, (snapshot) => {
                let hasChanges = false;
                snapshot.docChanges().forEach((change) => {
                    const stepId = change.doc.id;
                    const stepIndex = steps.findIndex(s => s.id === stepId);
                    
                    if (change.type === "added" || change.type === "modified") {
                        const imgData = change.doc.data().image;
                        if (stepIndex !== -1 && steps[stepIndex].image !== imgData) {
                            steps[stepIndex].image = imgData;
                            hasChanges = true;
                        }
                    }
                    if (change.type === "removed") {
                        if (stepIndex !== -1 && steps[stepIndex].image !== null) {
                            steps[stepIndex].image = null;
                            hasChanges = true;
                        }
                    }
                });
                if (hasChanges) {
                    renderSteps();
                }
            });
        }

        // Image Compression (高效能非同步壓縮版 - 轉換為 webp 減少體積)
        function compressImageAsync(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        // 【更新】將最大寬度從 1200 降至 800，避免觸發 5MB 本地限制或 1MB 雲端限制
                        const MAX_WIDTH = 800; 
                        let scaleSize = 1;
                        if (img.width > MAX_WIDTH) {
                            scaleSize = MAX_WIDTH / img.width;
                        }
                        canvas.width = img.width * scaleSize;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        // 【高級壓縮】轉換為 webp 格式，品質 0.6，體積大幅縮小
                        resolve(canvas.toDataURL('image/webp', 0.6)); 
                    };
                    img.onerror = () => reject(new Error("圖片解析失敗"));
                };
                reader.onerror = () => reject(new Error("檔案讀取失敗"));
            });
        }

        // Actions
        window.addStep = async () => {
            if (!currentUser) {
                window.showToast("未連線到資料庫，無法新增", true);
                return;
            }
            const newId = Date.now().toString();
            const newOrder = steps.length > 0 ? Math.max(...steps.map(s => s.order)) + 1 : 0;
            const stepData = { image: null, note: '', order: newOrder };

            // Optimistic UI (先在畫面加上去，讓操作不卡頓)
            steps.push({ id: newId, ...stepData });
            renderSteps();

            try {
                // 【修改】
                const stepRef = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', newId);
                await setDoc(stepRef, stepData);
            } catch (err) {
                window.showToast("新增至雲端失敗", true);
            }
        };

        window.handleImageUpload = async (id, inputElement) => {
            const file = inputElement.files[0];
            if (!file) return;

            if (!currentUser) {
                window.showToast("未連線，無法上傳圖片", true);
                return;
            }

            // 讓該區塊變半透明表示處理中
            const stepElement = document.getElementById(`step-${id}`);
            if(stepElement) stepElement.classList.add('opacity-50');
            window.showToast("處理圖片中...");

            try {
                // 1. 非同步壓縮圖片
                const compressedBase64 = await compressImageAsync(file);
                
                // 2. 樂觀更新 (Optimistic UI) - 讓畫面【瞬間】顯示圖片！
                const stepIndex = steps.findIndex(s => s.id === id);
                if(stepIndex !== -1) {
                    steps[stepIndex].image = compressedBase64;
                    renderSteps(); // 立刻重新渲染畫面
                }

                // 3. 分離式儲存 (Separated Storage)
                // 【核心修改】：不再合併至 workflow_steps，而是存入獨立的 workflow_images 集合
                const imageRef = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_images', id);
                await setDoc(imageRef, { image: compressedBase64 });
                window.showToast("圖片上傳成功");
                
            } catch (error) {
                console.error("Upload error:", error);
                if (error.code === 'resource-exhausted') {
                    window.showToast("圖片超過雲端大小限制，請嘗試更換圖片", true);
                } else {
                    window.showToast("圖片上傳失敗：" + error.message, true);
                }
            } finally {
                if(stepElement) stepElement.classList.remove('opacity-50');
                // 清空 input，這樣下次選同一張圖也能再次觸發 onchange
                inputElement.value = '';
            }
        };

                steps[stepIndex].image = null;

            const imageRef = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_images', id);
            await deleteDoc(imageRef);
        };

                 steps[stepIndex].note = text;

        window.handleNoteBlur = async (id, text) => {
            if (!currentUser) return;
            try {
                // 【修改】
                const stepRef = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', id);
                await setDoc(stepRef, { note: text }, { merge: true });
            } catch (err) {
                window.showToast("備註儲存失敗", true);
            }
        };

        window.deleteStep = async (id) => {
            if (!currentUser) return;
            
            // 樂觀更新：立刻移除畫面步驟
            steps = steps.filter(s => s.id !== id);
            renderSteps();

            try {
                // 【修改】
                const stepRef = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', id);
                await deleteDoc(stepRef);
                
                // 同步刪除分離的圖片檔
                const imageRef = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_images', id);
                await deleteDoc(imageRef);
            } catch (err) {
                window.showToast("刪除失敗", true);
            }
        };

        window.moveUp = async (index) => {
            if (!currentUser || index === 0) return;
            const step1 = steps[index];
            const step2 = steps[index - 1];

            // 樂觀更新：立刻調換順序
            const tempOrder = step1.order;
            step1.order = step2.order;
            step2.order = tempOrder;
            steps.sort((a, b) => a.order - b.order);
            renderSteps();

            // 【修改】
            const ref1 = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', step1.id);
            const ref2 = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', step2.id);
            await setDoc(ref1, { order: step1.order }, { merge: true });
            await setDoc(ref2, { order: step2.order }, { merge: true });
        };

        window.moveDown = async (index) => {
            if (!currentUser || index === steps.length - 1) return;
            const step1 = steps[index];
            const step2 = steps[index + 1];

            // 樂觀更新：立刻調換順序
            const tempOrder = step1.order;
            step1.order = step2.order;
            step2.order = tempOrder;
            steps.sort((a, b) => a.order - b.order);
            renderSteps();

            // 【修改】
            const ref1 = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', step1.id);
            const ref2 = doc(db, 'artifacts', appId, 'public', 'data', 'workflow_steps', step2.id);
            await setDoc(ref1, { order: step1.order }, { merge: true });
            await setDoc(ref2, { order: step2.order }, { merge: true });
        };

        // Render UI
        function renderSteps() {
            stepsContainer.innerHTML = '';
            
            steps.forEach((step, index) => {
                const isFirst = index === 0;
                const isLast = index === steps.length - 1;
                
                let imageContent = '';
                if (step.image) {
                        imageContent = `
                            <div class="relative rounded-xl overflow-hidden bg-slate-900 border border-slate-700/50">
                                <img src="${step.image}" alt="Step ${index + 1}" class="w-full h-auto object-cover max-h-[300px]" />
                                <button type="button" onclick="window.removeImage('${step.id}')" class="absolute top-2 right-2 p-2 bg-slate-900/80 backdrop-blur-sm rounded-full text-white shadow-lg active:scale-95 z-10 cursor-pointer">
                                    <i data-lucide="trash-2" class="w-4 h-4 pointer-events-none"></i>
                                </button>
                            </div>
                        `;
                    } else {
                        // iOS Safari 專屬修復：使用完全覆蓋的透明 input
                        imageContent = `
                            <div class="flex space-x-3">
                                <div class="relative flex-1 flex flex-col items-center justify-center py-6 px-4 border-2 border-dashed border-slate-600 rounded-xl bg-slate-800/50 active:bg-slate-700 transition-colors cursor-pointer text-slate-400 hover:text-indigo-400 overflow-hidden">
                                    <i data-lucide="camera" class="w-7 h-7 mb-2 pointer-events-none"></i>
                                    <span class="text-xs font-medium pointer-events-none">即時拍照</span>

                                </div>
                                <div class="relative flex-1 flex flex-col items-center justify-center py-6 px-4 border-2 border-dashed border-slate-600 rounded-xl bg-slate-800/50 active:bg-slate-700 transition-colors cursor-pointer text-slate-400 hover:text-indigo-400 overflow-hidden">
                                    <i data-lucide="image" class="w-7 h-7 mb-2 pointer-events-none"></i>
                                    <span class="text-xs font-medium pointer-events-none">從相簿選擇</span>
                                    <input type="file" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="window.handleImageUpload('${step.id}', this)" />
                                </div>
                            </div>
                        `;
                }

                let arrowContent = `
                    <div class="py-3 text-indigo-500/80 flex justify-center w-full">
                        <i data-lucide="arrow-down" class="w-8 h-8 animate-pulse"></i>
                    </div>
                `;

                const stepHTML = `
                    <div id="step-${step.id}" class="flex flex-col items-center transition-opacity duration-200">
                        <div class="w-full bg-slate-800 rounded-2xl p-4 shadow-lg border border-slate-700/50 relative group">
                            
                            <!-- Header -->
                                <div class="flex justify-between items-center mb-4">
                                    <div class="flex items-center space-x-3">
                                        <span class="flex items-center justify-center w-8 h-8 rounded-full bg-indigo-600 text-white font-bold text-sm shadow-md shadow-indigo-900/50">
                                            ${index + 1}
                                        </span>
                                        <span class="text-sm font-medium text-slate-300">步驟 ${index + 1}</span>
                                    </div>
                                    
                                    <div class="flex items-center space-x-1 relative z-10">
                                        <button type="button" onclick="window.moveUp(${index})" ${isFirst ? 'disabled' : ''} class="p-2 rounded-lg ${isFirst ? 'text-slate-600' : 'text-slate-400 active:bg-slate-700 hover:text-white'} cursor-pointer">
                                            <i data-lucide="arrow-up" class="w-4 h-4 pointer-events-none"></i>
                                        </button>
                                        <button type="button" onclick="window.moveDown(${index})" ${isLast ? 'disabled' : ''} class="p-2 rounded-lg ${isLast ? 'text-slate-600' : 'text-slate-400 active:bg-slate-700 hover:text-white'} cursor-pointer">
                                            <i data-lucide="arrow-down" class="w-4 h-4 pointer-events-none"></i>
                                        </button>
                                        <button type="button" onclick="window.deleteStep('${step.id}')" class="p-2 rounded-lg text-rose-400 active:bg-rose-950/50 hover:text-rose-300 cursor-pointer">
                                            <i data-lucide="trash-2" class="w-4 h-4 pointer-events-none"></i>
                                        </button>
                                    </div>
                                </div>

                                <!-- Image Area -->
                                <div class="mb-4 relative">
                                    ${imageContent}
                                </div>

                                <!-- Note Area -->
                            <div>
                                <textarea
                                    placeholder="點此輸入備註內容..."
                                    onchange="window.handleNoteChange('${step.id}', this.value)"
                                    onblur="window.handleNoteBlur('${step.id}', this.value)"
                                    class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-none min-h-[80px]"
                                >${step.note || ''}</textarea>
                            </div>
                        </div>
                        
                        <!-- Arrow -->
                        ${arrowContent}
                    </div>
                `;
                
                stepsContainer.insertAdjacentHTML('beforeend', stepHTML);
            });
            
            // Re-initialize Lucide icons
            lucide.createIcons();
        }

        // Daily Schedule Logic
        window.switchTab = (tab) => {
            const customPage = document.getElementById('customWorkflowPage');
            const dailyPage = document.getElementById('dailySchedulePage');
            const galleryPage = document.getElementById('galleryPage');
            const btnCustom = document.getElementById('tabCustom');
            const btnDaily = document.getElementById('tabDaily');
            const btnGallery = document.getElementById('tabGallery');

            const activeClass = "flex-1 py-1.5 text-[11px] sm:text-sm rounded-md bg-slate-800 text-cyan-400 shadow-[0_0_10px_rgba(34,211,238,0.2)] border border-cyan-500/50 transition-all uppercase tracking-widest neon-text";
            const inactiveClass = "flex-1 py-1.5 text-[11px] sm:text-sm text-slate-600 hover:text-cyan-200/50 transition-all uppercase tracking-widest";

            customPage.classList.add('hidden');
            dailyPage.classList.add('hidden');
            if(galleryPage) galleryPage.classList.add('hidden');
            
            btnCustom.className = inactiveClass;
            btnDaily.className = inactiveClass;
            if(btnGallery) btnGallery.className = inactiveClass;

            if (tab === 'custom') {
                customPage.classList.remove('hidden');
                btnCustom.className = activeClass;
            } else if (tab === 'daily') {
                dailyPage.classList.remove('hidden');
                btnDaily.className = activeClass;
                renderDailySchedule();
            } else if (tab === 'gallery') {
                if(galleryPage) galleryPage.classList.remove('hidden');
                if(btnGallery) btnGallery.className = activeClass;
                window.renderGallery();
            }
        };

        window.deleteTaskCard = (taskId, event) => {
            if(event) event.stopPropagation();
            dailyScheduleData = dailyScheduleData.filter(t => t.id !== taskId);
            localStorage.setItem('userDailyScheduleData', JSON.stringify(dailyScheduleData));
            
            // 清理關聯數據釋放空間
            delete taskCompletionState[taskId];
            delete taskExtrasState[taskId];
            delete taskArchiveState[taskId];
            localStorage.setItem('dailyTasksState', JSON.stringify(taskCompletionState));
            localStorage.setItem('dailyTasksExtras', JSON.stringify(taskExtrasState));
            localStorage.setItem('dailyTasksArchive', JSON.stringify(taskArchiveState));
            
            renderDailySchedule();
            window.showToast("排程卡片已刪除");
        };

        // 圖庫存檔專屬邏輯
        window.renderGallery = () => {
            const sidebar = document.getElementById('gallerySidebar');
            const grid = document.getElementById('galleryGrid');
            if(!sidebar || !grid) return;

            // 渲染側邊分類
            sidebar.innerHTML = galleryCategories.map((cat, idx) => {
                const isProtected = cat === '全部' || cat === '未分類';
                return `
                <div class="relative w-[60px] group shrink-0">
                    <div ondblclick="window.editCategory(${idx}, this)" onclick="window.switchGalleryCategory('${cat}')" class="w-full py-2 text-[10px] tracking-widest rounded-md transition-colors ${currentGalleryCategory === cat ? 'bg-cyan-900/80 text-cyan-300 border border-cyan-700 shadow-[0_0_5px_rgba(8,145,178,0.3)]' : 'text-slate-400 hover:bg-slate-800 border border-transparent'} px-1 cursor-pointer flex items-center justify-center break-words min-h-[30px] select-none text-center">
                        ${cat}
                    </div>
                    ${!isProtected ? `<button type="button" onclick="window.deleteCategory(${idx}); event.stopPropagation();" class="absolute -top-1 -right-1 bg-rose-500 text-white rounded-full p-0.5 opacity-0 group-hover:opacity-100 shadow transition-opacity z-10"><i data-lucide="x" class="w-2.5 h-2.5"></i></button>` : ''}
                </div>
                `;
            }).join('') + `
                <button type="button" onclick="window.addCategory()" class="w-[60px] py-1.5 mt-1 mb-2 flex justify-center text-cyan-600 hover:text-cyan-300 hover:bg-slate-800 rounded border border-dashed border-cyan-800 transition-colors shrink-0 active:scale-95"><i data-lucide="plus" class="w-4 h-4"></i></button>
            `;

            // 渲染網格圖片與搜尋過濾
            const query = document.getElementById('gallerySearchInput').value.toLowerCase();
            let filtered = galleryItems.filter(item => {
                const matchCat = currentGalleryCategory === '全部' || item.category === currentGalleryCategory;
                const matchQuery = item.title.toLowerCase().includes(query) || (item.timestamp && item.timestamp.includes(query));
                return matchCat && matchQuery;
            });

            if(filtered.length === 0) {
                grid.innerHTML = '<div class="absolute inset-0 flex flex-col items-center justify-center text-slate-600 text-xs tracking-widest"><i data-lucide="image-off" class="w-8 h-8 mb-2 opacity-50"></i>尚無對應圖片</div>';
            } else {
                grid.innerHTML = '<div class="grid grid-cols-2 gap-3 pb-6">' + filtered.map(item => `
                    <div class="bg-[#1a2332] rounded-lg overflow-hidden border border-slate-800 shadow-lg flex flex-col group relative">
                        <div class="aspect-square w-full relative">
                            <img src="${item.url}" class="w-full h-full object-cover active:scale-95 transition-transform cursor-pointer" onclick="window.openFullscreenImg('${item.url}')"/>
                            <button onclick="window.deleteGalleryItem('${item.id}')" class="absolute top-1.5 right-1.5 p-1.5 bg-rose-500/90 text-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity shadow-md active:bg-rose-600 z-10"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                        </div>
                        <div class="p-2 flex flex-col bg-[#151c28] flex-1">
                            <div class="text-[11px] text-slate-200 font-medium break-words whitespace-pre-wrap w-full text-left focus:outline-none focus:bg-slate-800 rounded p-1 min-h-[30px]" contenteditable="true" onblur="window.updateGalleryTitle('${item.id}', this.innerText)">${item.title}</div>
                        </div>
                    </div>
                `).join('') + '</div>';
            }
            lucide.createIcons();
        };

        window.addCategory = () => {
            const newName = '新分類';
            galleryCategories.push(newName);
            localStorage.setItem('galleryCategories', JSON.stringify(galleryCategories));
            window.renderGallery();
            window.showToast("已新增分類，點擊2下可修改名稱");
        };

        window.deleteCategory = (idx) => {
            const catToDelete = galleryCategories[idx];
            // 移動關聯照片到「未分類」
            galleryItems.forEach(item => {
                if(item.category === catToDelete) item.category = '未分類';
            });
            localStorage.setItem('galleryItems', JSON.stringify(galleryItems));
            
            galleryCategories.splice(idx, 1);
            localStorage.setItem('galleryCategories', JSON.stringify(galleryCategories));
            
            if (currentGalleryCategory === catToDelete) {
                currentGalleryCategory = '全部';
            }
            window.renderGallery();
            window.showToast("分類已刪除，關聯圖片已移至未分類");
        };

        window.editCategory = (idx, el) => {
            if (galleryCategories[idx] === '全部' || galleryCategories[idx] === '未分類') {
                window.showToast("預設分類無法修改", true);
                return;
            }
            el.contentEditable = true;
            el.classList.add('bg-slate-800', 'cursor-text');
            el.focus();
            
            // 將游標移到最後
            const range = document.createRange();
            const sel = window.getSelection();
            range.selectNodeContents(el);
            range.collapse(false);
            sel.removeAllRanges();
            sel.addRange(range);
            
            el.onblur = () => {
                el.contentEditable = false;
                el.classList.remove('bg-slate-800', 'cursor-text');
                const newName = el.innerText.trim();
                if (newName && newName !== galleryCategories[idx]) {
                    const oldName = galleryCategories[idx];
                    galleryCategories[idx] = newName;
                    localStorage.setItem('galleryCategories', JSON.stringify(galleryCategories));
                    
                    // 批量更新圖片分類
                    galleryItems.forEach(item => {
                        if(item.category === oldName) item.category = newName;
                    });
                    localStorage.setItem('galleryItems', JSON.stringify(galleryItems));
                    if (currentGalleryCategory === oldName) currentGalleryCategory = newName;
                    window.showToast("分類名稱已更新");
                }
                window.renderGallery();
            };
            el.onkeydown = (e) => {
                if(e.key === 'Enter') {
                    e.preventDefault();
                    el.blur();
                }
            };
        };

        window.switchGalleryCategory = (cat) => {
            currentGalleryCategory = cat;
            window.renderGallery();
        };

        window.handleGalleryUpload = async (input) => {
            const files = input.files;
            if(!files || files.length===0) return;
            window.showToast("壓縮與上傳中...");
            for(let i=0; i<files.length; i++) {
               try {
                   const b64 = await compressImageAsync(files[i]);
                   galleryItems.unshift({
                       id: 'g_'+Date.now()+'_'+i,
                       url: b64,
                       title: currentGalleryCategory === '全部' ? '未命名相片' : currentGalleryCategory + '紀錄',
                       category: currentGalleryCategory === '全部' ? '未分類' : currentGalleryCategory,
                       timestamp: new Date().toLocaleString('zh-TW', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })
                   });
               } catch(e) {}
            }
            try {
                localStorage.setItem('galleryItems', JSON.stringify(galleryItems));
                window.renderGallery();
                window.showToast("圖庫上傳完成");
            } catch(e) {
                window.showToast("手機暫存空間不足！", true);
            }
            input.value = '';
        };

        window.deleteGalleryItem = (id) => {
            galleryItems = galleryItems.filter(item => item.id !== id);
            localStorage.setItem('galleryItems', JSON.stringify(galleryItems));
            window.renderGallery();
        };

        window.updateGalleryTitle = (id, text) => {
            const item = galleryItems.find(i => i.id === id);
            if(item) {
                item.title = text.trim() || '未命名相片';
                localStorage.setItem('galleryItems', JSON.stringify(galleryItems));
            }
        };

        window.toggleTaskDetails = (taskId, event) => {
            event.stopPropagation(); // 防止觸發父層的 toggleTask (打勾完成)
            expandedTasksState[taskId] = !expandedTasksState[taskId];
            renderDailySchedule();
        };

        window.toggleTask = (taskId) => {
            const isCompleted = !taskCompletionState[taskId];
            taskCompletionState[taskId] = isCompleted;
            
            // 【核心機制】：勾選完成時，自動封裝資料並清空當前畫面
            if (isCompleted) {
                const extras = taskExtrasState[taskId] || { currentPhotos: [], currentNotes: [], subTasks: {} };
                
                let hasData = (extras.currentPhotos && extras.currentPhotos.length > 0) || 
                              (extras.currentNotes && extras.currentNotes.length > 0);

                // 檢查是否含有子任務資料
                if (!hasData && extras.subTasks) {
                    for (const key in extras.subTasks) {
                        if (extras.subTasks[key].photos?.length > 0 || extras.subTasks[key].notes?.length > 0) {
                            hasData = true;
                            break;
                        }
                    }
                }
                
                if (hasData) {
                    if (!taskArchiveState[taskId]) taskArchiveState[taskId] = [];
                    
                    const now = new Date();
                    taskArchiveState[taskId].unshift({
                        timestamp: now.getTime(),
                        dateStr: now.toLocaleString('zh-TW', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }),
                        photos: [...(extras.currentPhotos || [])],
                        notes: [...(extras.currentNotes || [])],
                        subTasks: JSON.parse(JSON.stringify(extras.subTasks || {})) // 深拷貝子任務紀錄
                    });
                    localStorage.setItem('dailyTasksArchive', JSON.stringify(taskArchiveState));
                    
                    // 重置當前記錄
                    extras.currentPhotos = [];
                    extras.currentNotes = [];
                    extras.subTasks = {};
                    taskExtrasState[taskId] = extras;
                    localStorage.setItem('dailyTasksExtras', JSON.stringify(taskExtrasState));
                    
                    window.showToast("任務完成！紀錄已打包入存檔庫");
                }
            }

            localStorage.setItem('dailyTasksState', JSON.stringify(taskCompletionState));
            renderDailySchedule(); 
        };

        // --- 子任務專屬紀錄方法 ---
        function initTaskExtras(taskId) {
            if (!taskExtrasState[taskId]) taskExtrasState[taskId] = { currentPhotos: [], currentNotes: [], subTasks: {} };
            if (!taskExtrasState[taskId].subTasks) taskExtrasState[taskId].subTasks = {};
            return taskExtrasState[taskId];
        }

        window.handleSubTaskPhotoUpload = async (taskId, subIdx, inputElement) => {
            const files = inputElement.files;
            if (!files || files.length === 0) return;

            window.showToast("壓縮與處理子任務圖片中...");
            try {
                const extras = initTaskExtras(taskId);
                if (!extras.subTasks[subIdx]) extras.subTasks[subIdx] = { photos: [], notes: [] };
                
                for(let i = 0; i < files.length; i++) {
                    const compressedBase64 = await compressImageAsync(files[i]);
                    extras.subTasks[subIdx].photos.push(compressedBase64);
                }
                
                try {
                    localStorage.setItem('dailyTasksExtras', JSON.stringify(taskExtrasState));
                    renderDailySchedule();
                } catch (storageError) {
                    if (storageError.name === 'QuotaExceededError' || storageError.message.includes('quota')) {
                        extras.subTasks[subIdx].photos.splice(-files.length, files.length);
                        window.showToast("手機暫存空間不足！", true);
                    } else { throw storageError; }
                }
            } catch (error) {
                window.showToast("圖片處理失敗", true);
            } finally {
                inputElement.value = '';
            }
        };

        window.toggleSubNoteInput = (taskId, subIdx) => {
            const container = document.getElementById(`subnote-input-container-${taskId}-${subIdx}`);
            if(container) {
                container.classList.toggle('hidden');
                if(!container.classList.contains('hidden')) {
                    document.getElementById(`subnote-input-${taskId}-${subIdx}`).focus();
                }
            }
        };

        window.submitSubTaskNote = (taskId, subIdx) => {
            const input = document.getElementById(`subnote-input-${taskId}-${subIdx}`);
            if(!input) return;
            const text = input.value.trim();
            if(!text) {
                window.toggleSubNoteInput(taskId, subIdx);
                return;
            }

            const extras = initTaskExtras(taskId);
            if (!extras.subTasks[subIdx]) extras.subTasks[subIdx] = { photos: [], notes: [] };
            extras.subTasks[subIdx].notes.push(text);
            
            localStorage.setItem('dailyTasksExtras', JSON.stringify(taskExtrasState));
            renderDailySchedule();
        };

        window.removeSubTaskPhoto = (taskId, subIdx, photoIdx) => {
            if(taskExtrasState[taskId]?.subTasks?.[subIdx]?.photos) {
                taskExtrasState[taskId].subTasks[subIdx].photos.splice(photoIdx, 1);
                localStorage.setItem('dailyTasksExtras', JSON.stringify(taskExtrasState));
                renderDailySchedule();
            }
        };

        window.removeSubTaskNote = (taskId, subIdx, noteIdx) => {
            if(taskExtrasState[taskId]?.subTasks?.[subIdx]?.notes) {
                taskExtrasState[taskId].subTasks[subIdx].notes.splice(noteIdx, 1);
                localStorage.setItem('dailyTasksExtras', JSON.stringify(taskExtrasState));
                renderDailySchedule();
            }
        };

        window.handleDailyPhotoUpload = async (taskId, inputElement) => {
            const files = inputElement.files;
            if (!files || files.length === 0) return;

            window.showToast("壓縮與處理圖片中...");
            try {
                if (!taskExtrasState[taskId]) taskExtrasState[taskId] = { currentPhotos: [], currentNotes: [] };
                if (!taskExtrasState[taskId].currentPhotos) taskExtrasState[taskId].currentPhotos = [];
                
                // 支援多張連續讀取 (採用高強度壓縮)
                for(let i = 0; i < files.length; i++) {
                    const compressedBase64 = await compressImageAsync(files[i]);
                    taskExtrasState[taskId].currentPhotos.push(compressedBase64);
                }
                
                try {
                    localStorage.setItem('dailyTasksExtras', JSON.stringify(taskExtrasState));
                    renderDailySchedule();
                    window.showToast("相片已附加至當前任務");
                } catch (storageError) {
                    // 偵測 localStorage 容量限制 (QuotaExceededError)
                    if (storageError.name === 'QuotaExceededError' || storageError.message.includes('quota')) {
                        // 移除剛才塞入但存不進去的圖片，避免資料庫崩潰
                        taskExtrasState[taskId].currentPhotos.splice(-files.length, files.length);

        function parseTime(timeStr) {
            const [hours, minutes] = timeStr.split(':').map(Number);
            const now = new Date();
            now.setHours(hours, minutes, 0, 0);
            return now;
        }

        function calculateTaskStatus(startStr, endStr) {
            const now = new Date();
            const start = parseTime(startStr);
            const end = parseTime(endStr);
            
            if (now < start) {
                const diffMins = Math.floor((start - now) / 60000);
                const h = Math.floor(diffMins / 60);
                const m = diffMins % 60;
                return { state: 'waiting', text: `未開始 (約 ${h > 0 ? h + '小時' : ''}${m}分後)` };
            } else if (now >= start && now <= end) {
                const diffMins = Math.floor((end - now) / 60000);
                const h = Math.floor(diffMins / 60);
                const m = diffMins % 60;
                return { state: 'active', text: `進行中 (剩餘 ${h > 0 ? h + '小時' : ''}${m}分)` };
            } else {
                const diffMins = Math.floor((now - end) / 60000);
                const h = Math.floor(diffMins / 60);
                const m = diffMins % 60;
                return { state: 'overdue', text: `已結束 (超時 ${h > 0 ? h + '小時' : ''}${m}分)` };
            }
        }

                                    <!-- 加文字備註 -->
                                    <div class="flex h-8 shadow-inner rounded-lg">
                                        <input type="text" id="note-input-${task.id}" placeholder="輸入改進或異常..." class="flex-1 bg-slate-950/50 border border-slate-700 border-r-0 rounded-l-lg px-2.5 text-[11px] text-cyan-100 placeholder-slate-600 focus:outline-none focus:border-cyan-500/50 tracking-widest w-full min-w-0">
                                        <button type="button" onclick="window.addDailyNote('${task.id}')" class="px-3 bg-slate-800 text-cyan-400 border border-slate-700 rounded-r-lg active:bg-cyan-900 transition-colors flex items-center justify-center"><i data-lucide="plus" class="w-4 h-4"></i></button>
                                    </div>
                                </div>

                                <!-- 右側：存檔庫按鈕 (縮出一個位置) -->
                                <button type="button" onclick="window.openArchive('${task.id}')" class="w-[60px] shrink-0 flex flex-col items-center justify-center rounded-lg bg-slate-900/80 border border-cyan-800/50 text-cyan-500 hover:bg-slate-800 transition-colors relative active:scale-95 shadow-inner">
                                    <i data-lucide="archive" class="w-4 h-4 mb-1"></i>
                                    <span class="text-[9px] tracking-widest">存檔庫</span>
                                    ${archive.length > 0 ? `<span class="absolute -top-2 -right-2 bg-emerald-600/90 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full shadow-[0_0_5px_rgba(52,211,153,0.5)] border border-slate-900 animate-pulse">${archive.length}</span>` : ''}
                                </button>
                            </div>

                        </div>
                        ` : `
                        <!-- 完成後僅顯示存檔庫按鈕 -->
                        <div class="mt-3 pt-3 border-t border-slate-800/50 flex justify-end">
                            <button type="button" onclick="window.openArchive('${task.id}')" class="flex items-center space-x-1 px-3 py-1.5 rounded-md bg-slate-950/50 border border-slate-800 text-slate-500 active:scale-95">
                                <i data-lucide="archive" class="w-3.5 h-3.5"></i>
                                <span class="text-[10px] tracking-widest">查看歷史紀錄 (${archive.length})</span>
                            </button>
                        </div>
                        `}
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', taskHTML);
            });
            
            // 加入新增任務卡片的按鈕
            if (window.isEditMode) {
                const addTaskBtnHTML = `
                    <div class="mt-6 flex justify-center pb-4">
                        <button type="button" onclick="window.addNewTaskCard()" class="w-full bg-slate-900/60 backdrop-blur-md rounded-2xl p-5 border-2 border-dashed border-amber-600/50 text-amber-500/80 hover:text-amber-400 hover:bg-amber-950/20 hover:border-amber-500 transition-all duration-300 flex flex-col items-center justify-center active:scale-[0.98] group shadow-inner cursor-pointer">
                            <i data-lucide="plus-circle" class="w-7 h-7 mb-2 group-hover:scale-110 transition-transform"></i>
                            <span class="text-xs tracking-widest font-bold">新增排程卡片</span>
                        </button>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', addTaskBtnHTML);
            }

            lucide.createIcons();

            // Refresh timers automatically (編輯模式下暫停刷新，防止輸入時失焦)
            if(timeUpdateInterval) clearInterval(timeUpdateInterval);
            timeUpdateInterval = setInterval(() => {
                if(!document.getElementById('dailySchedulePage').classList.contains('hidden') && !window.isEditMode) {
                    renderDailySchedule(); // lazy auto-update for timers
                }
            }, 60000); // Check every minute
        }

        // Start initialization
        initAuth();

    </script>
</head>
<body class="bg-slate-950 text-cyan-50 font-mono font-black sm:px-4 sm:py-8 flex justify-center relative min-h-screen">

    <!-- 掃描線特效 (Scanline) -->
    <div class="scanline"></div>

    <!-- Loading Mask -->
    <div id="loadingMask" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
        <i data-lucide="loader-2" class="w-12 h-12 text-indigo-500 animate-spin mb-4"></i>
        <p class="text-slate-300 font-medium tracking-widest text-sm">正在載入系統...</p>
    </div>

    <!-- Phone Container -->
    <div class="w-full max-w-[430px] bg-slate-900 sm:rounded-[3rem] sm:shadow-2xl sm:border-[8px] border-slate-800 overflow-hidden relative min-h-screen sm:min-h-[932px] pb-10">
        
        <!-- Header -->
        <header class="bg-slate-900/90 backdrop-blur-md sticky top-0 z-10 border-b border-cyan-900/50 p-5 pt-8 sm:pt-12 shadow-[0_4px_20px_rgba(8,145,178,0.1)]">
            <div class="flex items-center justify-between relative">
                <h1 class="text-xl text-cyan-400 tracking-[0.2em] flex-1 text-center neon-text">工作順序流程</h1>
            </div>
            <p class="text-[10px] text-center mt-2 flex items-center justify-center space-x-2 tracking-widest uppercase text-cyan-600">
                <span id="connectionDot" class="w-2 h-2 rounded-full bg-rose-500 transition-colors duration-300 shadow-[0_0_5px_currentColor]"></span>
                <span id="connectionStatus">System Connecting...</span>
            </p>

            <!-- 分頁切換 (Tab Control) -->
            <div class="mt-4 flex bg-slate-950 rounded-lg p-1 shadow-inner border border-slate-800 relative z-20">
                <button id="tabCustom" onclick="window.switchTab('custom')" class="flex-1 py-1.5 text-[11px] sm:text-sm text-slate-600 hover:text-cyan-200/50 transition-all uppercase tracking-widest">自訂流程</button>
                <button id="tabDaily" onclick="window.switchTab('daily')" class="flex-1 py-1.5 text-[11px] sm:text-sm rounded-md bg-slate-800 text-cyan-400 shadow-[0_0_10px_rgba(34,211,238,0.2)] border border-cyan-500/50 transition-all uppercase tracking-widest neon-text">每日排程</button>
                <button id="tabGallery" onclick="window.switchTab('gallery')" class="flex-1 py-1.5 text-[11px] sm:text-sm text-slate-600 hover:text-cyan-200/50 transition-all uppercase tracking-widest">圖庫存檔</button>
            </div>
        </header>

        <!-- Main Content (自訂流程) -->
        <main id="customWorkflowPage" class="p-5 space-y-2 block transition-opacity">
            
            <div id="stepsContainer">
                <!-- Steps will be dynamically injected here -->
            </div>

            <!-- 新增步驟框框 -->
            <button 
                id="addBoxBtn"
                type="button"
                onclick="window.addStep()"
                disabled
                class="w-full border-2 border-dashed border-slate-600 rounded-2xl p-6 flex flex-col items-center justify-center text-slate-400 hover:text-indigo-400 hover:border-indigo-500 hover:bg-slate-800/50 transition-all active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed relative z-10 cursor-pointer"
            >
                <i data-lucide="plus-circle" class="w-8 h-8 mb-2 pointer-events-none"></i>
                <span class="text-sm font-medium pointer-events-none">新增步驟</span>
            </button>

        </main>
        
        <!-- Main Content (每日排程 - 預設隱藏) -->
        <main id="dailySchedulePage" class="p-5 space-y-2 hidden transition-opacity relative z-10">
            
            <!-- 編輯模式切換開關 (新功能) -->
            <div class="flex justify-end mb-2 px-1">
                <label class="flex items-center cursor-pointer space-x-2 bg-slate-900/80 px-3 py-1.5 rounded-full border border-slate-700 shadow-inner active:scale-95 transition-transform">
                    <span class="text-[10px] text-slate-300 font-bold uppercase tracking-widest transition-colors duration-300" id="editModeLabel">一般檢視模式</span>
                    <div class="relative flex items-center">
                        <input type="checkbox" id="editModeToggle" class="sr-only" onchange="window.toggleEditMode(this.checked)">
                        <div class="block bg-slate-800 w-9 h-5 rounded-full border border-slate-600 transition-colors duration-300" id="editToggleBg"></div>
                        <div class="dot absolute left-1 bg-cyan-500 w-3 h-3 rounded-full transition-transform duration-300 shadow-md" id="editToggleDot"></div>
                    </div>
                </label>
            </div>

            <div id="hudContainer" class="flex flex-col items-center justify-center mb-6 p-5 bg-slate-900/60 backdrop-blur-md rounded-2xl border border-cyan-500/30 neon-border">
                <div class="relative w-32 h-32 mb-2">
                    <!-- 背景環 -->
                    <svg class="w-full h-full transform -rotate-90 drop-shadow-lg" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="40" fill="none" stroke="currentColor" class="text-slate-800" stroke-width="6"></circle>
                        <!-- 進度環 (周長約 251.2) -->
                        <circle id="hudProgressRing" cx="50" cy="50" r="40" fill="none" stroke="currentColor" class="text-cyan-400 hud-ring drop-shadow-[0_0_8px_rgba(34,211,238,0.8)]" stroke-width="6" stroke-dasharray="251.2" stroke-dashoffset="251.2" stroke-linecap="round"></circle>
                    </svg>
                    <!-- 百分比文字 -->
                    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                        <span id="hudPercentage" class="text-2xl text-cyan-400 neon-text tracking-wider mt-1">0%</span>
                        <span class="text-[9px] text-cyan-600/80 tracking-widest uppercase mt-0.5">效能指數</span>
                    </div>
                </div>
                <!-- 數據列 -->
                <div class="text-[11px] text-cyan-500/80 tracking-widest flex items-center justify-center space-x-2 bg-slate-950/50 px-4 py-1.5 rounded-full border border-cyan-900/50">
                    <i data-lucide="crosshair" class="w-3.5 h-3.5 text-cyan-400"></i>
                    <span>巡視座標達成: <span id="hudTaskCount" class="text-cyan-300 font-bold ml-1">0/14</span></span>
                </div>
            </div>

            <div id="scheduleContainer" class="space-y-4 pb-8">
                <!-- Daily Schedule will be injected here -->
            </div>
        </main>

        <!-- Main Content (獨立圖庫存檔 - 全新分頁) -->
        <main id="galleryPage" class="hidden h-[calc(100vh-140px)] sm:h-[750px] flex-col relative z-10 bg-slate-950">
            <!-- 搜尋與上傳區 (Header) -->
            <div class="p-3 border-b border-cyan-900/50 flex space-x-2 bg-slate-900 shrink-0 shadow-md z-20 relative">
                <div class="relative flex-1">
                    <i data-lucide="search" class="absolute left-2.5 top-2 w-4 h-4 text-cyan-500/50"></i>
                    <input type="text" id="gallerySearchInput" placeholder="搜尋圖片標題或日期..." oninput="window.renderGallery()" class="w-full bg-slate-950 border border-slate-700 rounded-lg pl-8 pr-3 py-1.5 text-xs text-cyan-100 placeholder-slate-600 focus:border-cyan-500/50 focus:outline-none tracking-widest">
                </div>
                <label class="bg-cyan-950/80 text-cyan-400 border border-cyan-700/50 px-3 py-1.5 rounded-lg flex items-center justify-center cursor-pointer active:scale-95 text-[11px] tracking-widest transition-colors hover:bg-cyan-900 shadow-inner">
                    <i data-lucide="upload" class="w-3.5 h-3.5 mr-1"></i> 上傳
                    <input type="file" accept="image/*" multiple class="hidden" onchange="window.handleGalleryUpload(this)">
                </label>
            </div>
            
            <div class="flex flex-1 overflow-hidden relative z-10">
                <!-- 左側分類列 -->
                <div class="w-[75px] shrink-0 border-r border-cyan-900/50 bg-slate-900/50 overflow-y-auto flex flex-col items-center py-2 space-y-2 scrollbar-hide shadow-[inset_-5px_0_10px_rgba(0,0,0,0.3)]" id="gallerySidebar">
                    <!-- Categories will be injected -->
                </div>
                <!-- 右側圖片網格 -->
                <div class="flex-1 p-3 overflow-y-auto bg-slate-950/80 relative scrollbar-hide" id="galleryGrid">
                    <!-- Images will be injected -->
                </div>
            </div>
        </main>

    </div>

    <!-- 歷史存檔 Modal -->
    <div id="archiveModal" class="fixed inset-0 bg-slate-950/95 backdrop-blur-md z-[100] hidden flex-col font-mono">
        <header class="p-5 border-b border-cyan-900/50 flex justify-between items-center shadow-lg bg-slate-900/80">
            <h2 class="text-cyan-400 font-black tracking-widest text-lg neon-text flex items-center"><i data-lucide="database" class="w-5 h-5 mr-2"></i> 任務歷史存檔</h2>
            <button onclick="window.closeArchive()" class="text-rose-400 p-2 rounded-full active:bg-rose-950 transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button>
        </header>
        <div id="archiveContent" class="flex-1 overflow-y-auto p-4 pb-20">
            <!-- 存檔記錄將動態載入於此 -->
        </div>
    </div>

    <!-- 圖片放大預覽 Modal -->
    <div id="imageViewer" class="fixed inset-0 bg-black/95 z-[200] hidden flex-col items-center justify-center p-4">
        <button onclick="document.getElementById('imageViewer').classList.add('hidden'); document.getElementById('imageViewer').classList.remove('flex');" class="absolute top-6 right-6 text-white bg-slate-800/80 p-2 rounded-full active:scale-95 shadow-lg border border-slate-600">
            <i data-lucide="x" class="w-6 h-6"></i>
        </button>
        <img id="imageViewerImg" src="" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl border border-slate-700" />
    </div>

</body>
</html>
