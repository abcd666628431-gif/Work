<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工作順序流程</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Firebase Configuration
        const userFirebaseConfig = {
            apiKey: "AIzaSyDcH7BFp9xghWLdgvsLseo3XyJG_opf9A8",
            authDomain: "icarus2-50e01.firebaseapp.com",
            databaseURL: "https://icarus2-50e01-default-rtdb.firebaseio.com",
            projectId: "icarus2-50e01",
            storageBucket: "icarus2-50e01.firebasestorage.app",
            messagingSenderId: "67456823",
            appId: "1:67456823:web:9b90f0c93d3cd1c7a394b2"
        };

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : userFirebaseConfig;
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // State Management
        let steps = [];
        let currentUser = null;
        let unsubscribeSnapshot = null;

        // DOM Elements
        const loadingMask = document.getElementById('loadingMask');
        const connectionStatus = document.getElementById('connectionStatus');
        const connectionDot = document.getElementById('connectionDot');
        const stepsContainer = document.getElementById('stepsContainer');
        const addBoxBtn = document.getElementById('addBoxBtn');

        // Initialize Icons
        lucide.createIcons();

        // Authentication
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
                await signInAnonymously(auth).catch(console.error);
            }
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                connectionDot.classList.replace('bg-rose-500', 'bg-emerald-500');
                connectionStatus.textContent = '已連線並同步';
                setupFirestoreListener();
            } else {
                connectionDot.classList.replace('bg-emerald-500', 'bg-rose-500');
                connectionStatus.textContent = '連線中...';
                if (unsubscribeSnapshot) unsubscribeSnapshot();
            }
        });

        // Firestore Listener
        function setupFirestoreListener() {
            if (!currentUser) return;
            
            const stepsRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'workflow_steps');
            
            unsubscribeSnapshot = onSnapshot(stepsRef, (snapshot) => {
                steps = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                steps.sort((a, b) => a.order - b.order);
                renderSteps();
                loadingMask.style.display = 'none';
                addBoxBtn.disabled = false;
            }, (error) => {
                console.error("Firestore Error:", error);
                loadingMask.style.display = 'none';
                addBoxBtn.disabled = false;
            });
        }

        // Image Compression
        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        let scaleSize = 1;
                        if (img.width > MAX_WIDTH) {
                            scaleSize = MAX_WIDTH / img.width;
                        }
                        canvas.width = img.width * scaleSize;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
            });
        }

        // Actions
        window.addStep = async () => {
            if (!currentUser) return;
            const newId = Date.now().toString();
            const newOrder = steps.length > 0 ? Math.max(...steps.map(s => s.order)) + 1 : 0;
            const stepData = { image: null, note: '', order: newOrder };

            // Optimistic UI
            steps.push({ id: newId, ...stepData });
            renderSteps();

            const stepRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'workflow_steps', newId);
            await setDoc(stepRef, stepData);
        };

        window.handleImageUpload = async (id, inputElement) => {
            if (!currentUser) return;
            const file = inputElement.files[0];
            if (file) {
                // Show loading on specific step (simplified for HTML version)
                const stepElement = document.getElementById(`step-${id}`);
                if(stepElement) stepElement.classList.add('opacity-50');

                try {
                    const compressedBase64 = await compressImage(file);
                    const stepRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'workflow_steps', id);
                    await setDoc(stepRef, { image: compressedBase64 }, { merge: true });
                } catch (error) {
                    console.error("Upload error:", error);
                } finally {
                    if(stepElement) stepElement.classList.remove('opacity-50');
                }
            }
        };

        window.removeImage = async (id) => {
            if (!currentUser) return;
            const stepRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'workflow_steps', id);
            await setDoc(stepRef, { image: null }, { merge: true });
        };

        window.handleNoteChange = (id, text) => {
             const stepIndex = steps.findIndex(s => s.id === id);
             if(stepIndex !== -1) {
                 steps[stepIndex].note = text;
             }
        }

        window.handleNoteBlur = async (id, text) => {
            if (!currentUser) return;
            const stepRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'workflow_steps', id);
            await setDoc(stepRef, { note: text }, { merge: true });
        };

        window.deleteStep = async (id) => {
            if (!currentUser) return;
            const stepRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'workflow_steps', id);
            await deleteDoc(stepRef);
        };

        window.moveUp = async (index) => {
            if (!currentUser || index === 0) return;
            const step1 = steps[index];
            const step2 = steps[index - 1];

            // Optimistic Update
            const tempOrder = step1.order;
            step1.order = step2.order;
            step2.order = tempOrder;
            steps.sort((a, b) => a.order - b.order);
            renderSteps();

            const ref1 = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'workflow_steps', step1.id);
            const ref2 = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'workflow_steps', step2.id);
            await setDoc(ref1, { order: step1.order }, { merge: true });
            await setDoc(ref2, { order: step2.order }, { merge: true });
        };

        window.moveDown = async (index) => {
            if (!currentUser || index === steps.length - 1) return;
            const step1 = steps[index];
            const step2 = steps[index + 1];

             // Optimistic Update
            const tempOrder = step1.order;
            step1.order = step2.order;
            step2.order = tempOrder;
            steps.sort((a, b) => a.order - b.order);
            renderSteps();

            const ref1 = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'workflow_steps', step1.id);
            const ref2 = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'workflow_steps', step2.id);
            await setDoc(ref1, { order: step1.order }, { merge: true });
            await setDoc(ref2, { order: step2.order }, { merge: true });
        };

        // Render UI
        function renderSteps() {
            stepsContainer.innerHTML = '';
            
            steps.forEach((step, index) => {
                const isFirst = index === 0;
                const isLast = index === steps.length - 1;
                
                let imageContent = '';
                if (step.image) {
                        imageContent = `
                            <div class="relative rounded-xl overflow-hidden bg-slate-900 border border-slate-700/50">
                                <img src="${step.image}" alt="Step ${index + 1}" class="w-full h-auto object-cover max-h-[300px]" />
                                <button onclick="removeImage('${step.id}')" class="absolute top-2 right-2 p-2 bg-slate-900/80 backdrop-blur-sm rounded-full text-white shadow-lg active:scale-95">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        `;
                    } else {
                        imageContent = `
                            <div class="flex space-x-3">
                                <label class="flex-1 flex flex-col items-center justify-center py-6 px-4 border-2 border-dashed border-slate-600 rounded-xl bg-slate-800/50 active:bg-slate-700 transition-colors cursor-pointer text-slate-400 hover:text-indigo-400">
                                    <i data-lucide="camera" class="w-7 h-7 mb-2"></i>
                                    <span class="text-xs font-medium">即時拍照</span>
                                    <input type="file" accept="image/*" capture="environment" class="hidden" onchange="handleImageUpload('${step.id}', this)" />
                                </label>
                                <label class="flex-1 flex flex-col items-center justify-center py-6 px-4 border-2 border-dashed border-slate-600 rounded-xl bg-slate-800/50 active:bg-slate-700 transition-colors cursor-pointer text-slate-400 hover:text-indigo-400">
                                    <i data-lucide="image" class="w-7 h-7 mb-2"></i>
                                    <span class="text-xs font-medium">從相簿選擇</span>
                                    <input type="file" accept="image/*" class="hidden" onchange="handleImageUpload('${step.id}', this)" />
                                </label>
                            </div>
                        `;
                }

                // 現在每個步驟（包含最後一個）下方都會有箭頭，引導至下個步驟或「新增框框」
                let arrowContent = `
                    <div class="py-3 text-indigo-500/80 flex justify-center w-full">
                        <i data-lucide="arrow-down" class="w-8 h-8 animate-pulse"></i>
                    </div>
                `;

                const stepHTML = `
                    <div id="step-${step.id}" class="flex flex-col items-center transition-opacity duration-200">
                        <div class="w-full bg-slate-800 rounded-2xl p-4 shadow-lg border border-slate-700/50 relative group">
                            
                            <!-- Header -->
                                <div class="flex justify-between items-center mb-4">
                                    <div class="flex items-center space-x-3">
                                        <span class="flex items-center justify-center w-8 h-8 rounded-full bg-indigo-600 text-white font-bold text-sm shadow-md shadow-indigo-900/50">
                                            ${index + 1}
                                        </span>
                                        <span class="text-sm font-medium text-slate-300">步驟 ${index + 1}</span>
                                    </div>
                                    
                                    <div class="flex items-center space-x-1">
                                        <button onclick="moveUp(${index})" ${isFirst ? 'disabled' : ''} class="p-2 rounded-lg ${isFirst ? 'text-slate-600' : 'text-slate-400 active:bg-slate-700 hover:text-white'}">
                                            <i data-lucide="arrow-up" class="w-4 h-4"></i>
                                        </button>
                                        <button onclick="moveDown(${index})" ${isLast ? 'disabled' : ''} class="p-2 rounded-lg ${isLast ? 'text-slate-600' : 'text-slate-400 active:bg-slate-700 hover:text-white'}">
                                            <i data-lucide="arrow-down" class="w-4 h-4"></i>
                                        </button>
                                        <button onclick="deleteStep('${step.id}')" class="p-2 rounded-lg text-rose-400 active:bg-rose-950/50 hover:text-rose-300">
                                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                                        </button>
                                    </div>
                                </div>

                                <!-- Image Area -->
                                <div class="mb-4 relative">
                                    ${imageContent}
                                </div>

                                <!-- Note Area -->
                            <div>
                                <textarea
                                    placeholder="點此輸入備註內容..."
                                    onchange="handleNoteChange('${step.id}', this.value)"
                                    onblur="handleNoteBlur('${step.id}', this.value)"
                                    class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-none min-h-[80px]"
                                >${step.note || ''}</textarea>
                            </div>
                        </div>
                        
                        <!-- Arrow -->
                        ${arrowContent}
                    </div>
                `;
                
                stepsContainer.insertAdjacentHTML('beforeend', stepHTML);
            });
            
            // Re-initialize Lucide icons for new DOM elements
            lucide.createIcons();
        }

        // Start initialization
        initAuth();

    </script>
</head>
<body class="bg-slate-950 text-slate-200 font-sans sm:px-4 sm:py-8 flex justify-center relative min-h-screen">

    <!-- Loading Mask -->
    <div id="loadingMask" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
        <i data-lucide="loader-2" class="w-12 h-12 text-indigo-500 animate-spin mb-4"></i>
        <p class="text-slate-300 font-medium tracking-widest text-sm">正在同步資料...</p>
    </div>

    <!-- Phone Container (移除了底部的 pb-24 空白) -->
    <div class="w-full max-w-[430px] bg-slate-900 sm:rounded-[3rem] sm:shadow-2xl sm:border-[8px] border-slate-800 overflow-hidden relative min-h-screen sm:min-h-[932px] pb-10">
        
        <!-- Header -->
        <header class="bg-slate-900/90 backdrop-blur-md sticky top-0 z-10 border-b border-slate-800 p-5 pt-8 sm:pt-12">
            <div class="flex items-center justify-between">
                <h1 class="text-xl font-bold text-white tracking-wider flex-1 text-center">工作順序流程</h1>
            </div>
            <p class="text-xs text-center mt-1 flex items-center justify-center space-x-2">
                <span id="connectionDot" class="w-2 h-2 rounded-full bg-rose-500 transition-colors duration-300"></span>
                <span id="connectionStatus" class="text-slate-400">連線中...</span>
            </p>
        </header>

        <!-- Main Content -->
        <main class="p-5 space-y-2">
            
            <div id="stepsContainer">
                <!-- Steps will be dynamically injected here -->
            </div>

            <!-- 新增步驟框框 -->
            <button 
                id="addBoxBtn"
                onclick="addStep()"
                disabled
                class="w-full border-2 border-dashed border-slate-600 rounded-2xl p-6 flex flex-col items-center justify-center text-slate-400 hover:text-indigo-400 hover:border-indigo-500 hover:bg-slate-800/50 transition-all active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed"
            >
                <i data-lucide="plus-circle" class="w-8 h-8 mb-2"></i>
                <span class="text-sm font-medium">新增步驟</span>
            </button>

        </main>
        
    </div>

</body>
</html>
